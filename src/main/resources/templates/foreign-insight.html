<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>해외 키워드 인사이트</title>
    <!-- WordCloud 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.min.js"></script>
    <!-- Chart.js 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 90%;
            max-width: 1400px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #5B55D7;
            display: flex;
            align-items: center;
        }
        h1 img {
            width: 24px;
            margin-right: 10px;
        }
        .section {
            margin-top: 30px;
        }
        .charts-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .chart-container {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            height: 350px;  /* 고정 높이 지정 */
            padding: 10px;
            box-sizing: border-box;
        }
        canvas {
            width: 100%;
            height: 100%;
        }
        #word-cloud {
            height: 300px;  /* 워드 클라우드 높이 지정 */
            background: #fff;
            border-radius: 10px;
            margin-top: 20px;
        }
        #search-results div {
            margin-bottom: 10px;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        /* 모달 스타일 (기사 결과용) */
        .modal {
            display: none; /* 기본 숨김 */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            border-radius: 10px;
            max-height: 80%;
            overflow-y: auto;
        }
        .close-btn {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-btn:hover,
        .close-btn:focus {
            color: #000;
            text-decoration: none;
        }
        /* 더보기 버튼 및 컨테이너 스타일 */
        #load-more-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }
        #load-more-btn {
            background-color: #5B55D7;
            color: #fff;
            border-radius: 5px;
            border: none;
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        #load-more-btn:hover {
            background-color: #4a45c4;
        }
        #load-more-btn:active {
            transform: scale(0.95);
        }
        /* 탭 메뉴 스타일 */
        .tab-menu {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .tab-menu a {
            padding: 10px 20px;
            margin: 0 5px;
            text-decoration: none;
            color: #333;
            background-color: #f0f0f0;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .tab-menu a.active {
            background-color: #5B55D7;
            color: white;
        }
        .tab-menu a:hover {
            background-color: #ddd;
        }
        .tab-menu a.active:hover {
            background-color: #4a45c4;
        }
        /* 키워드 검색 섹션 스타일 */
        .search-section {
            margin-top: 30px;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        .search-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .search-form input, .search-form select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            flex-grow: 1;
        }
        
        .search-form button {
            background-color: #5B55D7;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .search-form button:hover {
            background-color: #4a45c4;
        }
        
        .search-results {
            max-height: 500px;
            overflow-y: auto;
        }
        
        .article-item {
            display: flex;
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            transition: box-shadow 0.3s;
        }
        
        .article-item:hover {
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        .article-thumbnail {
            width: 150px;
            min-width: 150px;
            height: 120px;
            margin-right: 15px;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
        }
        
        .article-content {
            flex: 1;
        }
        
        .article-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            cursor: pointer;
            color: #333;
        }
        
        .article-title:hover {
            color: #5B55D7;
        }
        
        .article-meta {
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .article-category {
            background-color: #f0f0f0;
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 12px;
        }
        
        .article-summary {
            font-size: 14px;
            color: #555;
            line-height: 1.4;
        }
        
        .category-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .category-badge {
            background-color: #f0f0f0;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .category-badge:hover, .category-badge.active {
            background-color: #5B55D7;
            color: white;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        <img src="https://img.icons8.com/ios-filled/50/5B55D7/globe.png" /> 해외 키워드 인사이트
    </h1>
    
    <!-- 탭 메뉴 추가 -->
    <div class="tab-menu">
        <a href="/insight-view">국내 인사이트</a>
        <a href="/foreign-insight-view" class="active">해외 인사이트</a>
    </div>
    
    <label for="date">날짜 선택:</label>
    <input type="date" id="date" />
    <button onclick="loadAllData()">조회</button>

    <!-- 키워드 검색 섹션을 일간 데이터 섹션 위로 이동 -->
    <div class="search-section">
        <h2>키워드 기반 기사 검색</h2>
        
        <div class="category-list" id="category-list">
            <!-- 카테고리는 JavaScript로 동적 로드 -->
            <div class="category-badge active" id="all-category" data-category="">전체</div>
        </div>
        
        <div class="search-form">
            <input type="text" id="search-keyword" placeholder="검색할 키워드 입력" />
            <input type="date" id="search-start-date" />
            <input type="date" id="search-end-date" />
            <select id="search-category">
                <option value="">카테고리 선택 (전체)</option>
                <!-- 카테고리는 JavaScript로 동적 로드 -->
            </select>
            <button onclick="searchArticles()">검색</button>
        </div>
        
        <div class="search-results" id="search-results">
            <!-- 검색 결과는 JavaScript로 동적 로드 -->
        </div>
    </div>

    <!-- 일간 데이터 섹션 -->
    <div class="section" id="daily-section">
        <h2>일간 데이터</h2>
        <div class="charts-wrapper">
            <div class="chart-container">
                <canvas id="daily-keyword-chart"></canvas>
                <p style="text-align:center; font-weight:bold;">일간 키워드</p>
            </div>
            <div class="chart-container">
                <canvas id="daily-related-chart"></canvas>
                <p style="text-align:center; font-weight:bold;">일간 연관 키워드</p>
            </div>
        </div>
    </div>

    <!-- 주간 데이터 섹션 -->
    <div class="section" id="weekly-section">
        <h2>주간 데이터</h2>
        <p id="weekly-date-range" style="text-align:center; font-weight:bold;"></p>
        <div class="charts-wrapper">
            <div class="chart-container">
                <canvas id="weekly-keyword-chart"></canvas>
                <p style="text-align:center; font-weight:bold;">주간 키워드</p>
            </div>
            <div class="chart-container">
                <canvas id="weekly-related-chart"></canvas>
                <p style="text-align:center; font-weight:bold;">주간 연관 키워드</p>
            </div>
        </div>
    </div>

    <!-- 오른쪽 패널: 워드 클라우드 및 기사 결과 (모달 표시용) -->
    <div class="section" id="results-section">
        <h2>워드 클라우드</h2>
        <div id="word-cloud"></div>
        <h2>기사 결과</h2>
        <p>기사 결과는 모달 창으로 표시됩니다.</p>
    </div>
</div>

<!-- 모달 창: 기사 결과 표시 -->
<div id="article-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <div id="modal-articles"></div>
    </div>
</div>

<script>
    // 전역 변수 선언
    const PAGE_SIZE = 10;
    let ALL_ARTICLES = [];
    let displayedCount = 0;

    let dailyChart = null;
    let dailyRelatedChart = null;
    let weeklyChart = null;
    let weeklyRelatedChart = null;
    let wordCloudInstance = null;

    let currentDailyKeyword = '';
    let currentWeeklyKeyword = '';
    let currentRelatedKeyword = '';
    let currentSearchPage = 0;

    let DAILY_DATA = [];
    let WEEKLY_DATA = {};

    // 일간 데이터 가져오기 (해외 API로 변경)
    async function fetchDailyData(date) {
        try {
            const response = await fetch(`/api/insight/foreign?date=${date}`);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const data = await response.json();
            console.log('API 응답 데이터 구조:', JSON.stringify(data));
            return data.top_foreign_keywords || [];
        } catch (error) {
            console.error('일간 데이터 로딩 중 오류 발생:', error);
            return [];
        }
    }

    // 주간 데이터 가져오기 (해외 API로 변경)
    async function fetchWeeklyData(date) {
        try {
            const response = await fetch(`/api/insight/foreign/weekly?date=${date}`);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const data = await response.json();
            return {
                range_start: data.range_start || '',
                range_end: data.range_end || '',
                keywords: data.top_weekly_foreign_keywords || []
            };
        } catch (error) {
            console.error('주간 데이터 로딩 중 오류 발생:', error);
            return { range_start: '', range_end: '', keywords: [] };
        }
    }

    // 연관 기사 가져오기 (해외 API로 변경)
    async function fetchRelatedArticles(keyword, relatedKeyword, date) {
        currentSearchPage = 0;
        try {
            const response = await fetch(`/api/insight/foreign/related-search?keyword=${encodeURIComponent(keyword)}&relatedKeyword=${encodeURIComponent(relatedKeyword)}&date=${date}`);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const data = await response.json();
            ALL_ARTICLES = data.hits || [];
            return ALL_ARTICLES.slice(0, PAGE_SIZE);
        } catch (error) {
            console.error('기사 검색 중 오류 발생:', error);
            return [];
        }
    }

    // 범위 기반 연관 기사 가져오기 (해외 API로 변경)
    async function fetchRelatedArticlesRange(keyword, relatedKeyword, startDate, endDate, page = 0) {
        try {
            const response = await fetch(`/api/insight/foreign/related-search-range?keyword=${encodeURIComponent(keyword)}&relatedKeyword=${encodeURIComponent(relatedKeyword)}&startDate=${startDate}&endDate=${endDate}`);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const data = await response.json();
            ALL_ARTICLES = data.hits || [];
            const start = page * PAGE_SIZE;
            return ALL_ARTICLES.slice(start, start + PAGE_SIZE);
        } catch (error) {
            console.error('기간 기반 기사 검색 중 오류 발생:', error);
            return [];
        }
    }

    // 일간 키워드 막대 그래프 렌더링
    function renderDailyKeywordChart(dailyData) {
        console.log('일간 데이터 구조:', JSON.stringify(dailyData));
        const ctx = document.getElementById('daily-keyword-chart').getContext('2d');
        if (!dailyData || dailyData.length === 0) {
            if (dailyChart) dailyChart.destroy();
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            ctx.font = "16px Arial";
            ctx.fillText("일간 키워드 데이터가 없습니다.", 10, 50);
            return;
        }
        const labels = dailyData.map(item => item.keyword);
        const data = dailyData.map(item => item.frequency);

        if (dailyChart) dailyChart.destroy();

        dailyChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '빈도수',
                    data: data,
                    backgroundColor: 'rgba(54,162,235,0.6)',
                    borderColor: 'rgba(54,162,235,1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: Math.ceil(Math.max(...data) / 10) } }
                },
                plugins: { legend: { display: false } },
                onClick: (evt, activeElements) => {
                    if (activeElements.length > 0) {
                        const idx = activeElements[0].index;
                        currentDailyKeyword = dailyData[idx].keyword;
                        // 일간 메인 키워드 클릭 시, 일간 연관 키워드 그래프와 워드 클라우드 업데이트
                        console.log('선택된 키워드:', currentDailyKeyword);
                        console.log('연관 키워드 구조:', JSON.stringify(dailyData[idx].relatedKeywords));
                        renderDailyRelatedChart(dailyData[idx].relatedKeywords);
                        renderWordCloud(currentDailyKeyword, dailyData[idx].relatedKeywords);
                    }
                }
            }
        });
    }

    // 일간 연관 키워드 막대 그래프 렌더링 
    function renderDailyRelatedChart(relatedKeywords) {
        console.log('연관 키워드 데이터:', JSON.stringify(relatedKeywords));
        const ctx = document.getElementById('daily-related-chart').getContext('2d');
        
        // 연관 키워드가 없거나 배열이 비어있는 경우 처리
        if (!relatedKeywords || relatedKeywords.length === 0) {
            if (dailyRelatedChart) dailyRelatedChart.destroy();
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            
            // 더 명확한 메시지 표시
            ctx.font = "16px Arial";
            ctx.fillStyle = "#666";
            ctx.textAlign = "center";
            const centerX = ctx.canvas.width / 2;
            
            ctx.fillText("선택한 키워드에 대한 연관 키워드가 없습니다.", centerX, 50);
            ctx.font = "14px Arial";
            ctx.fillText("다른 키워드를 선택해 보세요.", centerX, 80);
            
            // 빈 워드 클라우드도 함께 처리
            const wordCloudElement = document.getElementById('word-cloud');
            wordCloudElement.innerHTML = '<p style="text-align: center; padding-top: 50px; color: #666;">선택한 키워드에 대한 연관 키워드가 없습니다.</p>';
            
            return;
        }
        
        const labels = relatedKeywords.map(item => item.relatedKeyword);
        const data = relatedKeywords.map(item => item.frequency);

        if (dailyRelatedChart) dailyRelatedChart.destroy();

        dailyRelatedChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '건수',
                    data: data,
                    backgroundColor: 'rgba(255,159,64,0.6)',
                    borderColor: 'rgba(255,159,64,1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: Math.ceil(Math.max(...data) / 10) } }
                },
                plugins: { legend: { display: false } },
                onClick: (evt, activeElements) => {
                    if (activeElements.length > 0) {
                        const idx = activeElements[0].index;
                        currentRelatedKeyword = relatedKeywords[idx].relatedKeyword;
                        // 일간 메인 + 연관 키워드 선택 시, 범위 기반 기사 검색 (날짜를 같은 값으로 사용)
                        const date = document.getElementById('date').value;
                        fetchRelatedArticles(currentDailyKeyword, currentRelatedKeyword, date, date)
                            .then(newArticles => renderModalArticles(newArticles, false));
                    }
                }
            }
        });
    }

    // 주간 키워드 막대 그래프 렌더링
    function renderWeeklyKeywordChart(weeklyData) {
        const ctx = document.getElementById('weekly-keyword-chart').getContext('2d');
        const labels = weeklyData.keywords.map(item => item.keyword);
        const data = weeklyData.keywords.map(item => item.totalFrequency);

        document.getElementById('weekly-date-range').textContent =
            `${weeklyData.range_start} ~ ${weeklyData.range_end}`;

        if (weeklyChart) weeklyChart.destroy();

        weeklyChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '총 빈도수',
                    data: data,
                    backgroundColor: 'rgba(75,192,192,0.6)',
                    borderColor: 'rgba(75,192,192,1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: Math.ceil(Math.max(...data) / 10) } }
                },
                plugins: { legend: { display: false } },
                onClick: (evt, activeElements) => {
                    if (activeElements.length > 0) {
                        const idx = activeElements[0].index;
                        currentWeeklyKeyword = weeklyData.keywords[idx].keyword;
                        // 주간 메인 키워드 클릭 시, 주간 연관 키워드 그래프와 워드 클라우드 업데이트,
                        // 그리고 범위 기반 기사 검색: WEEKLY_DATA의 범위 사용
                        renderWeeklyRelatedChart(weeklyData.keywords[idx].relatedKeywords);
                        renderWordCloud(currentWeeklyKeyword, weeklyData.keywords[idx].relatedKeywords);
                    }
                }
            }
        });
    }

    // 주간 연관 키워드 막대 그래프 렌더링
    function renderWeeklyRelatedChart(relatedKeywords) {
        const ctx = document.getElementById('weekly-related-chart').getContext('2d');
        if (!relatedKeywords || relatedKeywords.length === 0) {
            if (weeklyRelatedChart) weeklyRelatedChart.destroy();
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            ctx.font = "16px Arial";
            ctx.fillText("주간 연관 키워드 데이터가 없습니다.", 10, 50);
            return;
        }
        const labels = relatedKeywords.map(item => item.relatedKeyword);
        const data = relatedKeywords.map(item => item.frequency);

        if (weeklyRelatedChart) weeklyRelatedChart.destroy();

        weeklyRelatedChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '건수',
                    data: data,
                    backgroundColor: 'rgba(153,102,255,0.6)',
                    borderColor: 'rgba(153,102,255,1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: Math.ceil(Math.max(...data) / 10) } }
                },
                plugins: { legend: { display: false } },
                onClick: (evt, activeElements) => {
                    if (activeElements.length > 0) {
                        const idx = activeElements[0].index;
                        currentRelatedKeyword = relatedKeywords[idx].relatedKeyword;
                        // 주간 메인 + 연관 키워드 선택 시, 범위 기반 기사 검색 (WEEKLY_DATA 범위 사용)
                        const { range_start, range_end } = WEEKLY_DATA;
                        fetchRelatedArticlesRange(currentWeeklyKeyword, currentRelatedKeyword, range_start, range_end)
                            .then(newArticles => renderModalArticles(newArticles, false));
                    }
                }
            }
        });
    }

    // 워드 클라우드 렌더링
    function renderWordCloud(keyword, relatedKeywords) {
        const wordCloudElement = document.getElementById('word-cloud');
        
        // 연관 키워드가 없거나 배열이 비어있는 경우 처리
        if (!relatedKeywords || relatedKeywords.length === 0) {
            wordCloudElement.innerHTML = '<p style="text-align: center; padding-top: 50px; color: #666;">선택한 키워드에 대한 연관 키워드가 없습니다.</p>';
            return;
        }
        
        const wordList = relatedKeywords.map(k => [k.relatedKeyword, k.frequency || 10]);
        const minSize = 30, maxSize = 100;
        const freqs = relatedKeywords.map(k => k.frequency);
        const minFreq = Math.min(...freqs);
        const maxFreq = Math.max(...freqs);
        const weightFactorFn = function(size) {
            if (maxFreq === minFreq) return (minSize + maxSize) / 2;
            const normalized = (size - minFreq) / (maxFreq - minFreq);
            return minSize + normalized * (maxSize - minSize);
        };
        if (wordCloudInstance) wordCloudInstance.stop();
        wordCloudInstance = WordCloud(wordCloudElement, {
            list: wordList,
            gridSize: Math.round(20 * wordCloudElement.offsetWidth / 1024),
            weightFactor: weightFactorFn,
            fontFamily: 'Arial',
            color: () => `hsl(${Math.random()*360}, 70%, 50%)`,
            backgroundColor: '#fff',
            rotateRatio: 0,
            rotationSteps: 0,
        });
    }

    // 모달 창을 이용한 기사 결과 렌더링 (더보기 버튼 포함)
    function renderModalArticles(articles, append = false) {
        const modalArticlesDiv = document.getElementById("modal-articles");

        // 항상 loadMoreContainer를 제거하여 새로 위치시킵니다.
        let existingContainer = document.getElementById('load-more-container');
        if (existingContainer) {
            existingContainer.remove();
        }

        if (!append) {
            modalArticlesDiv.innerHTML = '';
        }

        // 새 기사들을 추가
        articles.forEach(article => {
            const articleDiv = document.createElement('div');
            articleDiv.style.display = 'flex';
            articleDiv.style.alignItems = 'center';
            articleDiv.style.marginBottom = '20px';
            articleDiv.style.padding = '10px';
            articleDiv.style.border = '1px solid #ddd';
            articleDiv.style.borderRadius = '10px';

            if (article.image_url) {
                const imgDiv = document.createElement('div');
                imgDiv.style.marginRight = '20px';
                imgDiv.style.flexShrink = '0';
                const img = document.createElement('img');
                img.src = article.image_url;
                img.alt = article.title;
                img.style.width = '200px';
                img.style.height = '150px';
                img.style.objectFit = 'cover';
                img.style.borderRadius = '8px';
                imgDiv.appendChild(img);
                articleDiv.appendChild(imgDiv);
            }

            const textDiv = document.createElement('div');
            textDiv.style.flex = '1';
            const title = document.createElement('h3');
            title.innerHTML = article.title;
            title.style.cursor = 'pointer';
            title.onclick = () => window.open(article.url, '_blank');
            textDiv.appendChild(title);
            const meta = document.createElement('p');
            meta.style.fontSize = '13px';
            meta.style.color = '#999';
            meta.style.marginBottom = '10px';
            meta.innerHTML = `언론사: ${article.media_company || 'Unknown'} | 게시일: ${article.date}`;
            textDiv.appendChild(meta);
            const snippet = document.createElement('p');
            snippet.innerHTML = article.highlights ? article.highlights.join(' ') : article.content.substring(0, 200) + '...';
            snippet.style.fontSize = '14px';
            snippet.style.color = '#555';
            textDiv.appendChild(snippet);
            articleDiv.appendChild(textDiv);

            modalArticlesDiv.appendChild(articleDiv);
        });

        // 더보기 버튼 및 컨테이너 생성 (항상 새로 생성해서 맨 하단에 위치시키기)
        const loadMoreContainer = document.createElement('div');
        loadMoreContainer.id = 'load-more-container';
        loadMoreContainer.style.display = 'flex';
        loadMoreContainer.style.justifyContent = 'flex-end';
        loadMoreContainer.style.marginTop = '20px';

        // 새로 불러온 기사 수가 PAGE_SIZE 이상이면 버튼을 보여줌
        if (articles.length >= PAGE_SIZE) {
            let loadMoreBtn = document.createElement('button');
            loadMoreBtn.id = 'load-more-btn';
            loadMoreBtn.textContent = '더보기';
            loadMoreBtn.style.backgroundColor = '#5B55D7';
            loadMoreBtn.style.color = '#fff';
            loadMoreBtn.style.borderRadius = '5px';
            loadMoreBtn.style.border = 'none';
            loadMoreBtn.style.padding = '8px 15px';
            loadMoreBtn.style.fontSize = '14px';
            loadMoreBtn.style.cursor = 'pointer';
            loadMoreBtn.style.transition = 'background-color 0.3s ease, transform 0.2s ease';
            loadMoreBtn.addEventListener('click', () => {
                currentSearchPage++;
                const date = document.getElementById('date').value;
                // 여기서는 일간 데이터를 기준으로 호출 (필요에 따라 주간 데이터로 변경 가능)
                fetchRelatedArticlesRange(currentDailyKeyword, currentRelatedKeyword, date, date, currentSearchPage)
                    .then(newArticles => renderModalArticles(newArticles, true));
            });
            loadMoreContainer.appendChild(loadMoreBtn);
        }

        // loadMoreContainer를 항상 맨 아래에 붙임
        modalArticlesDiv.appendChild(loadMoreContainer);

        // 모달 창 열기
        openModal();
    }

    // 모달 열기/닫기 함수 및 이벤트 리스너
    function openModal() {
        document.getElementById("article-modal").style.display = "block";
    }

    function closeModal() {
        document.getElementById("article-modal").style.display = "none";
    }

    document.addEventListener("DOMContentLoaded", function() {
        document.getElementById('date').value = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        loadAllData();
        loadCategories();
        const closeBtn = document.querySelector(".close-btn");
        closeBtn.addEventListener("click", closeModal);
        window.addEventListener("click", function(event) {
            const modal = document.getElementById("article-modal");
            if (event.target === modal) {
                closeModal();
            }
        });
    });

    // 전체 데이터 로드: 일간 및 주간 데이터 각각 불러와 차트 업데이트
    async function loadAllData() {
        const date = document.getElementById('date').value;
        // 일간 데이터
        DAILY_DATA = await fetchDailyData(date);
        renderDailyKeywordChart(DAILY_DATA);
        if (DAILY_DATA.length > 0) {
            currentDailyKeyword = DAILY_DATA[0].keyword;
            renderDailyRelatedChart(DAILY_DATA[0].relatedKeywords);
            renderWordCloud(currentDailyKeyword, DAILY_DATA[0].relatedKeywords);
        } else {
            if (dailyChart) dailyChart.destroy();
            if (dailyRelatedChart) dailyRelatedChart.destroy();
        }
        // 주간 데이터
        WEEKLY_DATA = await fetchWeeklyData(date);
        renderWeeklyKeywordChart(WEEKLY_DATA);
        if (WEEKLY_DATA.keywords.length > 0) {
            currentWeeklyKeyword = WEEKLY_DATA.keywords[0].keyword;
            renderWeeklyRelatedChart(WEEKLY_DATA.keywords[0].relatedKeywords);
        } else {
            if (weeklyChart) weeklyChart.destroy();
            if (weeklyRelatedChart) weeklyRelatedChart.destroy();
        }
    }

    // 카테고리 목록 로드
    async function loadCategories() {
        try {
            const response = await fetch(`/api/insight/categories?foreign=true`);
            if (!response.ok) {
                console.error(`카테고리 로드 중 오류: HTTP ${response.status}`);
                return;
            }
            
            const responseText = await response.text();
            let categories;
            
            try {
                categories = JSON.parse(responseText);
            } catch (e) {
                console.error('카테고리 데이터 파싱 오류:', e, responseText);
                return;
            }
            
            // 카테고리 목록 렌더링
            const categoryList = document.getElementById('category-list');
            const categorySelect = document.getElementById('search-category');
            
            // 기존 카테고리 제외하고 비우기
            Array.from(categoryList.children).forEach(child => {
                if (child.id !== 'all-category') {
                    child.remove();
                }
            });
            
            // 첫 번째 옵션을 제외하고 드롭다운 비우기
            while (categorySelect.options.length > 1) {
                categorySelect.remove(1);
            }
            
            // "전체" 카테고리 배지에 이벤트 리스너 추가
            const allCategoryBadge = document.getElementById('all-category');
            if (allCategoryBadge) {
                allCategoryBadge.addEventListener('click', () => {
                    // 모든 배지의 활성 상태 제거
                    document.querySelectorAll('.category-badge').forEach(b => b.classList.remove('active'));
                    // 전체 배지 활성화
                    allCategoryBadge.classList.add('active');
                    // 드롭다운 값 초기화
                    document.getElementById('search-category').value = '';
                });
            }
            
            // 카테고리 추가
            categories.forEach(category => {
                // 카테고리 배지 추가
                const badge = document.createElement('div');
                badge.className = 'category-badge';
                badge.textContent = `${category.name} (${category.count})`;
                badge.dataset.category = category.name;
                badge.addEventListener('click', () => {
                    // 다른 배지의 활성 상태 제거
                    document.querySelectorAll('.category-badge').forEach(b => b.classList.remove('active'));
                    // 현재 배지 활성화
                    badge.classList.add('active');
                    // 카테고리 선택
                    document.getElementById('search-category').value = category.name !== '일반' ? category.name : '';
                });
                categoryList.appendChild(badge);
                
                // 드롭다운 옵션 추가
                const option = document.createElement('option');
                option.value = category.name !== '일반' ? category.name : '';
                option.textContent = `${category.name} (${category.count})`;
                categorySelect.appendChild(option);
            });
        } catch (error) {
            console.error('카테고리 목록 로딩 중 오류 발생:', error);
        }
    }
    
    // 키워드 기반 기사 검색
    async function searchArticles() {
        const keyword = document.getElementById('search-keyword').value.trim();
        const startDate = document.getElementById('search-start-date').value;
        const endDate = document.getElementById('search-end-date').value;
        const category = document.getElementById('search-category').value;
        const resultsContainer = document.getElementById('search-results');
        
        // 입력 검증 강화
        if (!keyword) {
            resultsContainer.innerHTML = 
                '<div style="padding: 20px; background-color: #fff3cd; color: #856404; border-radius: 5px; margin-bottom: 15px;">' +
                '<strong>⚠️ 알림:</strong> 검색할 키워드를 입력해주세요.' +
                '</div>';
            document.getElementById('search-keyword').focus();
            return;
        }
        
        if (!startDate || !endDate) {
            resultsContainer.innerHTML = 
                '<div style="padding: 20px; background-color: #fff3cd; color: #856404; border-radius: 5px; margin-bottom: 15px;">' +
                '<strong>⚠️ 알림:</strong> 검색 기간을 설정해주세요.' +
                '</div>';
            if (!startDate) document.getElementById('search-start-date').focus();
            else document.getElementById('search-end-date').focus();
            return;
        }
        
        // 종료일이 시작일보다 이전인지 검사
        if (new Date(endDate) < new Date(startDate)) {
            resultsContainer.innerHTML = 
                '<div style="padding: 20px; background-color: #fff3cd; color: #856404; border-radius: 5px; margin-bottom: 15px;">' +
                '<strong>⚠️ 알림:</strong> 종료일은 시작일보다 이후여야 합니다.' +
                '</div>';
            document.getElementById('search-end-date').focus();
            return;
        }
        
        try {
            // 로딩 표시 강화
            resultsContainer.innerHTML = 
                '<div style="text-align: center; padding: 30px;">' +
                '<div style="display: inline-block; width: 40px; height: 40px; border: 5px solid #f3f3f3; ' +
                'border-top: 5px solid #5B55D7; border-radius: 50%; animation: spin 1s linear infinite;"></div>' +
                '<p style="margin-top: 15px; color: #666;">검색 중입니다. 잠시만 기다려주세요...</p>' +
                '</div>' +
                '<style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); }}</style>';
                
            const url = new URL('/api/insight/search', window.location.origin);
            url.searchParams.append('keyword', keyword);
            url.searchParams.append('startDate', startDate);
            url.searchParams.append('endDate', endDate);
            url.searchParams.append('foreign', 'true');
            if (category) {
                url.searchParams.append('category', category);
            }
            
            console.log('API 요청 URL:', url.toString());
            
            // 타임아웃 설정으로 요청 10초 이상 걸리면 오류 발생
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 30000); // 30초 타임아웃
            
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(timeoutId); // 타임아웃 제거
            
            const responseText = await response.text(); // 먼저 텍스트로 받아서 디버깅
            console.log('API 응답:', responseText);
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}, response: ${responseText}`);
            }
            
            // 유효한 JSON인지 확인
            let data;
            try {
                data = JSON.parse(responseText);
            } catch (jsonError) {
                console.error('JSON 파싱 오류:', jsonError);
                throw new Error('서버 응답이 유효한 JSON 형식이 아닙니다.');
            }
            
            // 데이터에 메시지가 있으면 표시 (인덱스 없음 등의 메시지)
            if (data.message) {
                console.log('서버 메시지:', data.message);
            }
            
            renderSearchResults(data);
        } catch (error) {
            console.error('기사 검색 중 오류 발생:', error);
            
            // 오류 종류에 따른 다른 메시지 표시
            let errorMsg = '검색 중 오류가 발생했습니다.';
            let detailMsg = error.message;
            
            if (error.name === 'AbortError') {
                errorMsg = '검색 요청 시간이 초과되었습니다.';
                detailMsg = '서버 응답이 너무 오래 걸려 요청이 취소되었습니다.';
            } else if (error.message.includes('NetworkError') || error.message.includes('Failed to fetch')) {
                errorMsg = '네트워크 연결 오류가 발생했습니다.';
                detailMsg = '인터넷 연결을 확인해주세요.';
            } else if (error.message.includes('500')) {
                errorMsg = '서버 내부 오류가 발생했습니다.';
                detailMsg = '관리자에게 문의하거나 잠시 후 다시 시도해 주세요.';
            } else if (error.message.includes('404')) {
                errorMsg = '요청한 페이지를 찾을 수 없습니다.';
                detailMsg = 'API 경로가 올바른지 확인해주세요.';
            }
            
            resultsContainer.innerHTML = 
                `<div style="padding: 20px; background-color: #f8d7da; color: #721c24; border-radius: 5px; margin-bottom: 15px;">
                    <h3 style="margin-top: 0;">⚠️ ${errorMsg}</h3>
                    <p style="margin-bottom: 10px;">${detailMsg}</p>
                    <p style="font-size: 13px; color: #777;">자세한 내용은 개발자 콘솔을 확인하세요. (F12 키)</p>
                    <button onclick="searchArticles()" style="margin-top: 10px; padding: 8px 15px; background-color: #721c24; 
                     color: white; border: none; border-radius: 5px; cursor: pointer;">다시 시도</button>
                </div>`;
        }
    }
    
    // 검색 결과 렌더링
    function renderSearchResults(data) {
        const resultsContainer = document.getElementById('search-results');
        resultsContainer.innerHTML = '';
        
        if (!data.hits || data.hits.length === 0) {
            resultsContainer.innerHTML = 
                '<p style="text-align: center; padding: 20px; color: #666;">검색 결과가 없습니다.</p>';
            return;
        }
        
        data.hits.forEach(article => {
            const articleElement = document.createElement('div');
            articleElement.className = 'article-item';
            
            // 썸네일 이미지
            const thumbnailElement = document.createElement('div');
            thumbnailElement.className = 'article-thumbnail';
            thumbnailElement.style.backgroundImage = article.image_url ? 
                `url(${article.image_url})` : 
                'url(https://via.placeholder.com/150x120?text=No+Image)';
            articleElement.appendChild(thumbnailElement);
            
            // 기사 내용
            const contentElement = document.createElement('div');
            contentElement.className = 'article-content';
            
            // 제목
            const titleElement = document.createElement('div');
            titleElement.className = 'article-title';
            titleElement.innerHTML = article.title;
            titleElement.onclick = () => window.open(article.url, '_blank');
            contentElement.appendChild(titleElement);
            
            // 메타 정보
            const metaElement = document.createElement('div');
            metaElement.className = 'article-meta';
            
            const dateElement = document.createElement('span');
            dateElement.textContent = `${article.date || 'Unknown'}`;
            metaElement.appendChild(dateElement);
            
            const sourceElement = document.createElement('span');
            sourceElement.textContent = `출처: ${article.media_company || 'Unknown'}`;
            metaElement.appendChild(sourceElement);
            
            const categoryElement = document.createElement('span');
            categoryElement.className = 'article-category';
            categoryElement.textContent = article.category || '일반';
            metaElement.appendChild(categoryElement);
            
            contentElement.appendChild(metaElement);
            
            // 요약
            const summaryElement = document.createElement('div');
            summaryElement.className = 'article-summary';
            if (article.highlights && article.highlights.length > 0) {
                summaryElement.innerHTML = article.highlights.join(' ... ');
            } else {
                summaryElement.textContent = article.content ? 
                    (article.content.substring(0, 200) + '...') : 
                    '내용 없음';
            }
            contentElement.appendChild(summaryElement);
            
            articleElement.appendChild(contentElement);
            resultsContainer.appendChild(articleElement);
        });
        
        // 검색 결과 합계 표시
        const totalElement = document.createElement('div');
        totalElement.style.textAlign = 'right';
        totalElement.style.marginTop = '10px';
        totalElement.style.color = '#666';
        totalElement.textContent = `총 ${data.total || 0}개의 검색 결과 중 ${data.hits.length}개 표시`;
        resultsContainer.appendChild(totalElement);
    }
</script>
