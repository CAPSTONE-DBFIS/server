<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRENDB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background-color: #f4f4f4;
            display: flex;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 700px;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin: auto;
        }

        .chat-header {
            font-size: 1.8em;
            font-weight: 600;
            text-align: center;
            color: #333;
            margin-top: 0; /* 상단 여백 제거 */
        }

        .chat-box {
            height: 500px;
            overflow-y: auto;
            padding: 15px;
            border-radius: 8px;
            background-color: #f9f9f9;
            font-size: 1.1em;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .chat-input {
            display: flex;
            margin-top: 15px;
        }

        .chat-input input {
            flex: 1;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1em;
            outline: none;
        }

        .chat-input button {
            background-color: #0a192f;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px 25px;
            margin-left: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s ease;
        }

        .chat-input button:hover {
            background-color: #021024;
        }

        .messages-container {
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 80%;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .message.user {
            background-color: #0a192f;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message.bot {
            background-color: #e5e5ea;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .accordion {
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-top: 0; /* 위쪽 여백 제거 */
            overflow: hidden;
            background: #f1f1f1;
        }

        .accordion-header {
            padding: 15px;
            cursor: pointer;
            background: #0a192f;
            color: white;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
            font-size: 1.1em;
            margin-top: 0; /* 위쪽 여백 제거 */
        }

        .accordion-content {
            padding: 10px;
            font-size: 1em;
            background: #fff;
            display: none; /* 기본적으로 숨김 */
            line-height: 1.4;
            margin-top: 0; /* 위쪽 여백 제거 */
        }

        .accordion-content p {
            margin: 0;
            padding: 0;
            font-size: 1em;
            line-height: 1.4;
        }

        .accordion-header.active + .accordion-content {
            display: block;
        }

        @keyframes typing {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }

        .typing::after {
            content: '';
            animation: typing 1.5s steps(3, end) infinite;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        TRENDB
    </div>
    <div class="chat-box" id="chatBox">
        <div class="messages-container" id="messagesContainer">
            <!-- 채팅 메시지 표시 영역 -->
        </div>
    </div>
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="TRENDB에게 메시지 쓰기" onkeypress="handleKeyPress(event)" />
        <button onclick="sendMessage()">전송</button>
    </div>
</div>

<script>
    function handleKeyPress(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    }

    function formatResponseText(text) {
        return text
            .replace(/&lt;/g, '<')
            .replace(/&gt;/g, '>')
            .replace(/\n/g, '<br>')
            .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
            .replace(/\*(.*?)\*/g, '<i>$1</i>');
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('messagesContainer');

        if (input.value.trim() === '') return;

        const userMessage = document.createElement('div');
        userMessage.classList.add('message', 'user');
        userMessage.textContent = input.value;
        chatBox.appendChild(userMessage);

        const botMessage = document.createElement('div');
        botMessage.classList.add('message', 'bot');
        botMessage.innerHTML = "<span class='typing'></span>";
        chatBox.appendChild(botMessage);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch('http://localhost:8080/api/chatbot/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: input.value })
            });

            if (response.ok) {
                const data = await response.json();
                botMessage.innerHTML = "";
                applyTypingEffect(botMessage, formatResponseText(data.results.gpt_response), () => {
                    addAccordion(data.results.search_results);
                });

            } else {
                botMessage.innerHTML = "챗봇: 서버 오류 발생했습니다.";
            }

        } catch (error) {
            botMessage.innerHTML = "챗봇: 네트워크 오류 발생. 다시 시도해 주세요.";
        }

        input.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function applyTypingEffect(element, text, callback) {
        let index = 0;
        element.innerHTML = "";

        const interval = setInterval(() => {
            element.innerHTML = text.substring(0, index + 1);
            index++;
            if (index === text.length) {
                clearInterval(interval);
                if (callback) callback();
            }
        }, 50);
    }

    function addAccordion(results) {
        const chatBox = document.getElementById('messagesContainer');
        const accordion = document.createElement('div');
        accordion.classList.add('accordion');

        let header = document.createElement('div');
        header.classList.add('accordion-header');
        header.textContent = "출처 보기";
        accordion.appendChild(header);

        let content = document.createElement('div');
        content.classList.add('accordion-content');

        results.forEach((result, index) => {
            content.innerHTML += `
            <p><b>제목:</b> ${result.title}</p>
            <p><b>날짜:</b> ${result.date}</p>
            <p><b>카테고리:</b> ${result.category}</p>
            <p><b>링크:</b> <a href="${result.url}" target="_blank">${result.url}</a></p>
            ${index < results.length - 1 ? '<hr>' : ''}
        `;
        });

        accordion.appendChild(content);
        header.addEventListener('click', () => {
            header.classList.toggle('active');
        });

        chatBox.appendChild(accordion);
    }
</script>

</body>
</html>
