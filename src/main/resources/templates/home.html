<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>챗봇 홈페이지</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            margin: auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
        .chat-input {
            display: flex;
            padding: 10px;
        }
        .chat-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-right: 10px;
        }
        .chat-input button {
            padding: 10px;
            border: none;
            border-radius: 4px;
            background: #28a745;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>챗봇과 대화하기</h2>
    <div class="chat-box" id="chatBox">
        <!-- 채팅 메시지가 여기에 표시됩니다 -->
    </div>
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="메시지를 입력하세요..." />
        <button onclick="sendMessage()">전송</button>
    </div>
</div>

<script>
    function sendMessage() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');

        // 사용자의 메시지를 추가
        const userMessage = document.createElement('div');
        userMessage.textContent = "사용자: " + input.value;
        chatBox.appendChild(userMessage);

        // 챗봇의 응답을 추가 (여기서는 단순한 예시)
        const botMessage = document.createElement('div');
        botMessage.textContent = "챗봇: " + "안녕하세요! 어떻게 도와드릴까요?";
        chatBox.appendChild(botMessage);

        // 입력 필드 비우기
        input.value = '';

        // 스크롤을 채팅 박스 맨 아래로
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
