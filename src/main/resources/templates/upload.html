<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파일 업로드</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center">파일 업로드</h2>

    <div class="card shadow p-4">
        <form id="uploadForm">
            <div class="mb-3">
                <label for="file" class="form-label">업로드할 파일:</label>
                <input type="file" class="form-control" name="file" id="file" required>
            </div>

            <div class="mb-3">
                <label for="teamId" class="form-label">팀 선택:</label>
                <select class="form-select" name="teamId" id="teamId" required>
                    <option value="" disabled selected>팀을 선택하세요</option>
                </select>
            </div>

            <button type="button" class="btn btn-primary w-100" onclick="uploadFile()">파일 업로드</button>
        </form>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        loadUserTeams();
    });

    function loadUserTeams() {
        const token = localStorage.getItem("accessToken");

        if (!token) {
            alert("로그인이 필요합니다.");
            window.location.href = "/login";
            return;
        }

        fetch("http://localhost:8080/api/teams/my-teams", {
            method: "GET",
            headers: {
                "Authorization": `Bearer ${token}`
            }
        })
            .then(response => response.json())
            .then(teams => {
                const teamSelect = document.getElementById("teamId");
                teams.forEach(team => {
                    const option = document.createElement("option");
                    option.value = team.teamId;
                    option.textContent = team.teamName;
                    teamSelect.appendChild(option);
                });
            })
            .catch(error => {
                console.error("팀 목록 로드 실패:", error);
                alert("팀 목록을 불러오지 못했습니다. 다시 로그인해주세요.");
            });
    }

    function uploadFile() {
        const token = localStorage.getItem("accessToken");
        const fileInput = document.getElementById("file");
        const teamId = document.getElementById("teamId").value;

        if (!fileInput.files.length || !teamId) {
            alert("파일과 팀을 선택해주세요.");
            return;
        }

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);
        formData.append("teamId", teamId);

        fetch("http://localhost:8080/api/files/upload", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${token}`
            },
            body: formData
        })
            .then(response => response.text())
            .then(result => {
                alert(result);
                fileInput.value = "";
                document.getElementById("teamId").selectedIndex = 0;
            })
            .catch(error => {
                console.error("파일 업로드 실패:", error);
                alert("파일 업로드 중 오류가 발생했습니다. 다시 시도해주세요.");
            });
    }
</script>

</body>
</html>
