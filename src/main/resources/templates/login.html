<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css"
    />
    <style>
        .gradient-custom {
            background: linear-gradient(to right, rgba(106, 17, 203, 1), rgba(37, 117, 252, 1));
        }
    </style>
</head>
<body class="gradient-custom">
<section class="d-flex vh-100">
    <div class="container-fluid row justify-content-center align-content-center">
        <div class="card bg-dark" style="border-radius: 1rem;">
            <div class="card-body p-5 text-center">

                <!-- 로그인 폼 -->
                <div id="login-container">
                    <h2 class="text-white">LOGIN</h2>
                    <p class="text-white-50 mt-2 mb-4">
                        서비스를 사용하려면 로그인을 해주세요!
                    </p>
                    <form id="loginForm">
                        <div class="mb-3 text-left">
                            <label class="form-label text-white">아이디</label>
                            <input type="text" class="form-control" id="id" required />
                        </div>
                        <div class="mb-3 text-left">
                            <label class="form-label text-white">비밀번호</label>
                            <input
                                    type="password"
                                    class="form-control"
                                    id="password"
                                    required
                            />
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">
                            로그인
                        </button>
                    </form>
                    <p id="errorMessage" class="text-danger mt-3"></p>

                    <div class="d-grid gap-2 mt-3">
                        <button
                                type="button"
                                class="btn btn-outline-light btn-block"
                                onclick="location.href='/signup'"
                        >
                            회원가입
                        </button>
                    </div>
                    <div class="row mt-2">
                        <div class="col-6 pr-1">
                            <button
                                    type="button"
                                    class="btn btn-outline-light btn-block"
                                    id="forgotIdModalBtn"
                            >
                                아이디 찾기
                            </button>
                        </div>
                        <div class="col-6 pl-1">
                            <button
                                    type="button"
                                    class="btn btn-outline-light btn-block"
                                    id="forgotPasswordModalBtn"
                            >
                                비밀번호 찾기
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 이메일 인증 폼 -->
                <div id="verification-container" style="display: none;">
                    <h2 class="text-white">이메일 인증</h2>
                    <p class="text-white-50 mt-2 mb-4">
                        이메일로 받은 인증번호를 입력하세요.
                    </p>
                    <form id="verificationForm">
                        <div class="mb-3 text-left">
                            <input
                                    type="text"
                                    class="form-control"
                                    id="verificationCode"
                                    placeholder="인증번호 입력"
                                    required
                            />
                        </div>
                        <button type="submit" class="btn btn-success btn-block">
                            인증 완료
                        </button>
                    </form>
                    <button
                            id="resendVerificationBtn"
                            class="btn btn-warning btn-block mt-3"
                    >
                        인증번호 다시 받기
                    </button>
                </div>

            </div>
        </div>
    </div>
</section>

<!-- 아이디 찾기 모달 -->
<div
        class="modal fade"
        id="forgotIdModal"
        tabindex="-1"
        role="dialog"
        aria-labelledby="forgotIdModalLabel"
        aria-hidden="true"
>
    <div class="modal-dialog" role="document">
        <div class="modal-content bg-light">
            <div class="modal-header">
                <h5 class="modal-title" id="forgotIdModalLabel">아이디 찾기</h5>
                <!-- 부트스트랩4 문법으로 수정 -->
                <button
                        type="button"
                        class="close"
                        data-dismiss="modal"
                        aria-label="Close"
                >
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body text-left">
                <p>가입한 이메일을 입력하세요.</p>
                <input
                        type="email"
                        class="form-control"
                        id="forgotIdEmail"
                        placeholder="이메일 입력"
                        required
                />
                <p id="forgotIdMessage" class="mt-2"></p>
            </div>
            <div class="modal-footer">
                <button
                        type="button"
                        class="btn btn-secondary"
                        data-dismiss="modal"
                >
                    닫기
                </button>
                <button
                        type="button"
                        class="btn btn-primary"
                        onclick="requestIdLookup()"
                >
                    아이디 찾기
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 비밀번호 찾기 모달 -->
<div
        class="modal fade"
        id="forgotPasswordModal"
        tabindex="-1"
        role="dialog"
        aria-labelledby="forgotPasswordModalLabel"
        aria-hidden="true"
>
    <div class="modal-dialog" role="document">
        <div class="modal-content bg-light">
            <div class="modal-header">
                <h5 class="modal-title" id="forgotPasswordModalLabel">
                    비밀번호 찾기
                </h5>
                <button
                        type="button"
                        class="close"
                        data-dismiss="modal"
                        aria-label="Close"
                >
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body text-left">
                <p>
                    가입한 이메일을 입력하세요. 비밀번호 재설정 링크를 보내드립니다.
                </p>
                <input
                        type="email"
                        class="form-control"
                        id="forgotPasswordEmail"
                        placeholder="이메일 입력"
                        required
                />
                <p id="forgotPasswordMessage" class="mt-2"></p>
            </div>
            <div class="modal-footer">
                <button
                        type="button"
                        class="btn btn-secondary"
                        data-dismiss="modal"
                >
                    닫기
                </button>
                <button
                        type="button"
                        class="btn btn-primary"
                        onclick="requestPasswordReset()"
                >
                    비밀번호 재설정
                </button>
            </div>
        </div>
    </div>
</div>

<!-- jQuery & Bootstrap4 JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let currentLoginId = "";

    // 로그인
    document
        .getElementById("loginForm")
        .addEventListener("submit", async function (e) {
            e.preventDefault();
            const id = document.getElementById("id").value;
            const password = document.getElementById("password").value;
            currentLoginId = id;

            try {
                const res = await fetch("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id, password }),
                });

                // 서버가 이메일 인증 필요 메시지를 던지면
                if (res.status === 400) {
                    const text = await res.text();
                    if (text.includes("이메일 인증이 필요합니다. 인증을 완료해주세요.")) {
                        document.getElementById("login-container").style.display = "none";
                        document.getElementById("verification-container").style.display = "block";

                        // 인증번호 재전송 호출
                        resendVerification();

                        return;
                    }
                }

                if (!res.ok) throw new Error("로그인 실패, 다시 시도해주세요.");

                const data = await res.json();
                localStorage.setItem("accessToken", data.accessToken);
                localStorage.setItem("refreshToken", data.refreshToken);
                window.location.href = "/";
            } catch (err) {
                document.getElementById("errorMessage").innerText = err.message;
            }
        });

    // 이메일 인증번호 재전송
    async function resendVerification() {
        try {
            const res = await fetch("/api/resend-verification?memberId=" + encodeURIComponent(currentLoginId), {
                method: "POST",
            });
            if (res.ok) {
                alert("인증번호가 이메일로 재전송되었습니다.");
            } else {
                alert("인증번호 재전송 실패.");
            }
        } catch {
            alert("서버 오류");
        }
    }

    // 이메일 인증
    document
        .getElementById("verificationForm")
        .addEventListener("submit", async function (e) {
            e.preventDefault();
            const code = document.getElementById("verificationCode").value;
            try {
                const res = await fetch(
                    `/api/verify-signup?memberId=${encodeURIComponent(currentLoginId)}&verificationCode=${encodeURIComponent(code)}`,
                    { method: "POST" }
                );
                if (res.ok) {
                    alert("인증 완료! 다시 로그인 해주세요.");
                    location.reload();
                } else {
                    alert("인증번호가 올바르지 않습니다.");
                }
            } catch {
                alert("서버 오류가 발생했습니다.");
            }
        });

    // 인증번호 재전송
    document
        .getElementById("resendVerificationBtn")
        .addEventListener("click", async function () {
            if (!currentLoginId) return alert("먼저 로그인 시도해주세요.");
            try {
                const res = await fetch(
                    "/api/resend-verification?memberId=" + encodeURIComponent(currentLoginId),
                    { method: "POST" }
                );
                if (res.ok) {
                    alert("인증번호가 이메일로 재전송되었습니다.");
                } else {
                    alert("재전송 실패했습니다.");
                }
            } catch {
                alert("서버 오류");
            }
        });

    // 모달 열기
    $(document).ready(function () {
        $("#forgotIdModalBtn").click(() => $("#forgotIdModal").modal("show"));
        $("#forgotPasswordModalBtn").click(() =>
            $("#forgotPasswordModal").modal("show")
        );
    });

    // 아이디 찾기
    async function requestIdLookup() {
        const email = $("#forgotIdEmail").val(),
            msg = $("#forgotIdMessage");
        if (!email)
            return msg.text("이메일을 입력하세요.").addClass("text-danger");
        try {
            const res = await fetch("/api/find-id", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email }),
            });
            const txt = await res.text();
            msg
                .text(res.ok ? `아이디: ${txt}` : "이메일을 찾을 수 없습니다.")
                .toggleClass("text-success", res.ok)
                .toggleClass("text-danger", !res.ok);
        } catch {
            msg.text("서버 오류").addClass("text-danger");
        }
    }

    // 비밀번호 찾기
    async function requestPasswordReset() {
        const email = $("#forgotPasswordEmail").val(),
            msg = $("#forgotPasswordMessage");
        msg.text("").removeClass("text-danger text-success");
        if (!email)
            return msg.text("이메일을 입력하세요.").addClass("text-danger");
        try {
            const res = await fetch("/api/find-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email }),
            });
            msg
                .text(
                    res.ok ? "비밀번호 재설정 링크가 이메일로 전송되었습니다." : "이메일을 찾을 수 없습니다."
                )
                .toggleClass("text-success", res.ok)
                .toggleClass("text-danger", !res.ok);
        } catch {
            msg.text("서버 오류").addClass("text-danger");
        }
    }
</script>
</body>
</html>
