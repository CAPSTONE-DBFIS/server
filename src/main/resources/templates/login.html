<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">

    <style>
        .gradient-custom {
            background: linear-gradient(to right, rgba(106, 17, 203, 1), rgba(37, 117, 252, 1));
        }
    </style>
</head>
<body class="gradient-custom">
<section class="d-flex vh-100">
    <div class="container-fluid row justify-content-center align-content-center">
        <div class="card bg-dark" style="border-radius: 1rem;">
            <div class="card-body p-5 text-center">
                <h2 class="text-white">LOGIN</h2>
                <p class="text-white-50 mt-2 mb-5">서비스를 사용하려면 로그인을 해주세요!</p>

                <div class="mb-2">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label text-white">아이디</label>
                            <input type="text" class="form-control" id="id" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white">비밀번호</label>
                            <input type="password" class="form-control" id="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">로그인</button>
                    </form>

                    <!-- 회원가입 버튼 -->
                    <div class="d-grid gap-2 mt-3">
                        <button type="button" class="btn btn-outline-light btn-block" onclick="location.href='/signup'">
                            회원가입
                        </button>
                    </div>

                    <!-- 아이디 찾기 & 비밀번호 찾기 버튼 -->
                    <div class="row mt-2">
                        <div class="col-6 pr-1">
                            <button type="button" class="btn btn-outline-light btn-block text-center" id="forgotIdModalBtn">
                                아이디 찾기
                            </button>
                        </div>
                        <div class="col-6 pl-1">
                            <button type="button" class="btn btn-outline-light btn-block text-center" id="forgotPasswordModalBtn">
                                비밀번호 찾기
                            </button>
                        </div>
                    </div>
                </div>
                <p id="errorMessage" class="text-danger mt-3"></p>
            </div>
        </div>
    </div>
</section>

<!-- 아이디 찾기 모달 -->
<div class="modal fade" id="forgotIdModal" tabindex="-1" aria-labelledby="forgotIdModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="forgotIdModalLabel">아이디 찾기</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <p>가입한 이메일을 입력하세요.</p>
                <input type="email" class="form-control" id="forgotIdEmail" placeholder="이메일 입력" required>
                <p id="forgotIdMessage" class="mt-2"></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">닫기</button>
                <button type="button" class="btn btn-primary" onclick="requestIdLookup()">아이디 찾기</button>
            </div>
        </div>
    </div>
</div>

<!-- 비밀번호 찾기 모달 -->
<div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="forgotPasswordModalLabel">비밀번호 찾기</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <p>가입한 이메일을 입력하세요. 비밀번호 재설정 링크를 보내드립니다.</p>
                <input type="email" class="form-control" id="forgotPasswordEmail" placeholder="이메일 입력" required>
                <p id="forgotPasswordMessage" class="mt-2"></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">닫기</button>
                <button type="button" class="btn btn-primary" onclick="requestPasswordReset()">비밀번호 재설정</button>
            </div>
        </div>
    </div>
</div>

<!-- jQuery & Bootstrap JS 추가 -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>

<script>
    $(document).ready(function() {
        console.log("스크립트 로드 완료 ✅");

        $("#forgotIdModalBtn").click(function() {
            $("#forgotIdModal").modal("show");
        });

        $("#forgotPasswordModalBtn").click(function() {
            $("#forgotPasswordModal").modal("show");
        });
    });

    document.getElementById("loginForm").addEventListener("submit", async function(event) {
        event.preventDefault();

        const id = document.getElementById("id").value;
        const password = document.getElementById("password").value;

        try {
            const response = await fetch("/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id, password })
            });

            if (!response.ok) throw new Error("아이디 또는 비밀번호를 확인하세요.");

            const responseData = await response.json();
            if (responseData.accessToken) {
                localStorage.setItem("accessToken", responseData.accessToken);
                localStorage.setItem("refreshToken", responseData.refreshToken);
                window.location.href = "/"; //
            } else {
                throw new Error("로그인 실패: 응답 형식이 올바르지 않습니다.");
            }
        } catch (error) {
            document.getElementById("errorMessage").innerText = error.message;
        }
    });

    async function requestIdLookup() {
        const email = document.getElementById("forgotIdEmail").value;
        const messageElement = document.getElementById("forgotIdMessage");

        if (!email) {
            messageElement.innerText = "이메일을 입력하세요.";
            messageElement.classList.add("text-danger");
            return;
        }

        try {
            const response = await fetch("/api/find-id", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email })
            });

            const data = await response.text();
            if (response.ok) {
                messageElement.innerText = `아이디: ${data}`;
                messageElement.classList.add("text-success");
            } else {
                throw new Error("이메일을 찾을 수 없습니다.");
            }
        } catch (error) {
            messageElement.innerText = error.message;
            messageElement.classList.add("text-danger");
        }
    }

    // 비밀번호 찾기 요청
    async function requestPasswordReset() {
        const email = document.getElementById("forgotPasswordEmail").value;
        const messageElement = document.getElementById("forgotPasswordMessage");

        messageElement.innerText = "";
        messageElement.classList.remove("text-danger", "text-success");

        if (!email) {
            messageElement.innerText = "이메일을 입력하세요.";
            messageElement.classList.add("text-danger");
            return;
        }

        try {
            const response = await fetch("/api/find-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email })
            });

            console.log("서버 응답 상태: ", response.status);

            if (response.ok) {
                messageElement.innerText = "비밀번호 재설정 링크가 이메일로 전송되었습니다.";
                messageElement.classList.add("text-success");
            } else {
                throw new Error("이메일을 찾을 수 없습니다.");
            }
        } catch (error) {
            messageElement.innerText = error.message;
            messageElement.classList.add("text-danger");
        }
    }
</script>
</body>
</html>
