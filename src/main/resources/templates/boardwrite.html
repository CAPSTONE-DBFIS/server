<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>게시물작성폼</title>
</head>

<style>
    .layout{
        width: 500px;
        margin: 0 auto;
        margin-top: 40px;
    }

    .layout  input {
        width: 100%;
        box-sizing: border-box;
    }

    .layout textarea {
        width: 100%;
        margin-top: 10px;
        min-height: 300px;
    }
</style>
<body>
<h1>게시글 작성</h1>

<!-- 제목과 내용 입력 필드 -->
<label for="title">제목:</label>
<input type="text" id="title" name="title">
<br>

<label for="content">내용:</label>
<textarea id="content" name="content"></textarea>
<br>

<!-- 작성 버튼 -->
<button onclick="submitPost()">게시글 작성</button>

<script>
    function getCookie(name) {
        const value = `; ${document.cookie}`;  // 쿠키 문자열 앞에 세미콜론 추가
        const parts = value.split(`; ${name}=`);  // 쿠키 이름과 값을 구분해서 배열로 분리
        if (parts.length === 2) {
            return parts.pop().split(';').shift();  // 쿠키 값 반환
        }
        return null;  // 쿠키가 없으면 null 반환
    }

    //해시태그
    function extractHashtags(text) {
        // 한글, 숫자, 알파벳, 밑줄을 포함한 해시태그 추출
        return text.match(/#([A-Za-z0-9_가-힣]+)/g) || [];  // 한글 포함
    }

    function submitPost() {
        let title = document.getElementById('title').value.trim();
        let content = document.getElementById('content').value.trim();
        let hashtags = extractHashtags(content)

        if (!title || !content) {
            alert("제목과 내용을 모두 입력해주세요.");
            return;
        }

        alert("추출된 해시태그: " + JSON.stringify(hashtags));

        // 쿠키에서 토큰을 가져옵니다.
        let token = getCookie('refresh_token');
        if (!token) {
            alert('로그인 정보가 없습니다!');
            return;
        }

        fetch('/board/writedo', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token, // Authorization 헤더에 토큰 추가
            },
            body: JSON.stringify({
                title: title,
                content: content,
                hashtags: hashtags // 해시태그 포함하여 서버로 전송
            })
        })
            .then(response => {
                if (response.redirected) {
                    window.location.href = response.url; // 리디렉션 URL로 이동
                } else {
                    return response.json(); // 정상적인 응답 처리
                }
            })
            .then(data => {
                console.log('Success:', data);
                // 성공 시 처리
                window.location.href = '/board/list';
            })
            .catch(error => {
                console.error('Error:', error);
                // 에러 시 처리
                window.location.href = '/board/list';
            });
    }

</script>
</body>
</html>
