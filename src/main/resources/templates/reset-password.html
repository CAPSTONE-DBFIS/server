<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>비밀번호 재설정</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container">
  <h2>비밀번호 재설정</h2>

  <!-- 오류 메시지 표시 (토큰이 만료되었거나 유효하지 않을 때) -->
  <div th:if="${errorMessage}" class="alert alert-danger text-center">
    <p th:text="${errorMessage}"></p>
    <button class="btn btn-secondary mt-2" onclick="window.close()">창 닫기</button>
  </div>

  <form id="resetPasswordForm" th:if="${token}">
    <input type="hidden" id="token" th:value="${token}">

    <div class="mb-3">
      <label>새 비밀번호 (8자 이상, 특수문자 포함)</label>
      <input type="password" class="form-control" id="newPassword" required>
    </div>

    <div class="mb-3">
      <label>비밀번호 확인</label>
      <input type="password" class="form-control" id="confirmPassword" required>
    </div>

    <button type="submit" class="btn btn-primary">비밀번호 변경</button>
  </form>

  <p id="resetPasswordMessage" class="text-danger mt-3"></p>
</div>

<script>
  document.getElementById("resetPasswordForm")?.addEventListener("submit", async function(event) {
    event.preventDefault();

    const token = document.getElementById("token").value;
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const messageElement = document.getElementById("resetPasswordMessage");

    // 비밀번호 입력 검증
    if (!newPassword || !confirmPassword) {
      messageElement.innerText = "모든 필드를 입력하세요.";
      return;
    }

    if (newPassword !== confirmPassword) {
      messageElement.innerText = "비밀번호가 일치하지 않습니다.";
      return;
    }

    if (newPassword.length < 8 || !/[!@#$%^&*(),.?":{}|<>]/.test(newPassword)) {
      messageElement.innerText = "비밀번호는 8자 이상이어야 하며 특수 문자를 포함해야 합니다.";
      return;
    }

    try {
      const response = await fetch("/api/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, newPassword })
      });

      const responseData = await response.text();

      if (!response.ok) {
        messageElement.innerText = responseData || "비밀번호 변경 중 오류 발생.";
        return;
      }

      alert(responseData); // 성공 메시지 출력
      window.location.href = "/login";

    } catch (error) {
      messageElement.innerText = "서버 요청 중 오류가 발생했습니다.";
    }
  });
</script>
</body>
</html>
