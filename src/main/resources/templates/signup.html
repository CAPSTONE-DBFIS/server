<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 가입</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        .gradient-custom {
            background: linear-gradient(to right, rgba(254, 238, 229, 1), rgba(229, 193, 197, 1));
        }
    </style>
</head>
<body class="gradient-custom">
<section class="d-flex vh-100">
    <div class="container-fluid row justify-content-center align-content-center">
        <div class="card bg-dark" style="border-radius: 1rem;">
            <div class="card-body p-5 text-center">
                <h2 class="text-white">회원 가입</h2>
                <p class="text-white-50 mt-2 mb-5">서비스 사용을 위한 회원 가입</p>

                <!-- 회원가입 폼 -->
                <div id="signup-form-container">
                    <form id="signupForm">
                        <div class="mb-3">
                            <label class="form-label text-white">아이디</label>
                            <input type="text" class="form-control" name="id" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white">비밀번호</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white">이름</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white">이메일</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white">핸드폰 번호</label>
                            <input type="tel" class="form-control" name="phone" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white">닉네임</label>
                            <input type="text" class="form-control" name="nickname">
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white">부서</label>
                            <input type="text" class="form-control" name="department" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white">직무</label>
                            <input type="text" class="form-control" name="role" required>
                        </div>

                        <button type="submit" class="btn btn-primary">회원 가입</button>
                    </form>
                </div>

                <!-- 인증번호 입력 폼 -->
                <div id="verification-form-container" style="display: none;">
                    <h3 class="text-white">이메일 인증</h3>
                    <p class="text-white-50">이메일로 받은 인증번호를 입력하세요.</p>
                    <form id="verificationForm">
                        <div class="mb-3">
                            <label class="form-label text-white">인증번호</label>
                            <input type="text" class="form-control" name="verificationCode" required>
                        </div>
                        <button type="submit" class="btn btn-success">인증 완료</button>
                    </form>
                </div>

            </div>
        </div>
    </div>
</section>

<script>
    let currentSignupId = ""; // 여기에 회원가입할 때 입력한 ID 저장

    $(document).ready(function () {
        // 회원가입 폼 제출
        $('#signupForm').on('submit', function (e) {
            e.preventDefault();

            currentSignupId = $('input[name="id"]').val(); // 아이디 저장

            var formData = {
                id: currentSignupId,
                password: $('input[name="password"]').val(),
                name: $('input[name="name"]').val(),
                email: $('input[name="email"]').val(),
                phone: $('input[name="phone"]').val(),
                nickname: $('input[name="nickname"]').val(),
                department: $('input[name="department"]').val(),
                role: $('input[name="role"]').val(),
            };

            $.ajax({
                type: 'POST',
                url: '/api/signup',
                contentType: 'application/json',
                data: JSON.stringify(formData),
                success: function () {
                    alert('회원가입이 완료되었습니다. 이메일 인증을 진행해주세요.');
                    $('#signup-form-container').hide();
                    $('#verification-form-container').show();
                },
                error: function () {
                    alert('회원가입에 실패했습니다.');
                }
            });
        });

        // 인증번호 검증 폼 제출
        $('#verificationForm').on('submit', function (e) {
            e.preventDefault();

            var verificationCode = $('input[name="verificationCode"]').val();

            var verifyData = {
                memberId: currentSignupId,
                verificationCode: verificationCode
            };

            $.ajax({
                type: 'POST',
                url: '/api/verify-signup',
                contentType: 'application/json',
                data: JSON.stringify(verifyData),
                success: function () {
                    alert('인증 완료! 로그인 페이지로 이동합니다.');
                    window.location.href = '/login';
                },
                error: function () {
                    alert('인증번호가 올바르지 않습니다.');
                }
            });
        });
    });
</script>
</body>
</html>
