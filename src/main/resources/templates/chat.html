<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRENDB 채팅</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        /* 전체 레이아웃을 화면 크기에 맞게 조정 */
        body {
            display: flex;
            height: 100vh;
            background-color: #f4f4f4;
            overflow: hidden;
        }

        /* 사이드바 */
        .sidebar {
            width: 250px;
            background: #0a192f;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .chatroom-list {
            flex-grow: 1;
            overflow-y: auto;
        }

        .chatroom-item {
            padding: 12px;
            background: #1a2b50;
            margin-bottom: 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .chatroom-item:hover, .chatroom-item.active {
            background: #0088cc;
        }

        .new-chatroom-btn {
            background: #00aaff;
            color: white;
            border: none;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s ease;
        }

        .new-chatroom-btn:hover {
            background: #0077aa;
        }

        /* 채팅창 */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin: auto;
            max-width: 700px;
            height: 90vh; /* 화면의 90% 높이 차지 */
        }

        .chat-header {
            font-size: 1.8em;
            font-weight: 600;
            text-align: center;
            color: #333;
        }

        .chat-box {
            flex: 1; /* 남은 공간을 모두 차지 */
            overflow-y: auto;
            padding: 15px;
            border-radius: 8px;
            background-color: #f9f9f9;
            font-size: 1.1em;
            word-wrap: break-word;
            white-space: pre-wrap;
            min-height: 100px; /* 너무 작아지지 않도록 */
        }

        .chat-input {
            display: flex;
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-top: 1px solid #ddd;
        }

        .chat-input input {
            flex: 1;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1em;
            outline: none;
        }

        .chat-input button {
            background-color: #0a192f;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px 25px;
            margin-left: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s ease;
        }

        .chat-input button:hover {
            background-color: #021024;
        }

        .messages-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
        }

        .message-wrapper {
            display: flex;
            justify-content: flex-start; /* 기본적으로 챗봇 메시지는 왼쪽 */
            width: 100%;
        }

        .message-wrapper.user {
            justify-content: flex-end; /* 사용자 메시지는 오른쪽 */
        }

        .message {
            max-width: 60%;
            min-width: 120px;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 1rem;
            word-wrap: break-word;
            white-space: pre-wrap;
            display: inline-block;
        }

        .message.user {
            background-color: #0a192f;
            color: white;
            text-align: left;
            border-bottom-right-radius: 5px;
        }

        .message.bot {
            background-color: #e5e5ea;
            color: #333;
            text-align: left;
            border-bottom-left-radius: 5px;
        }

        .message-time {
            font-size: 0.8em;
            color: gray;
            margin-top: 5px;
            text-align: right;
        }
    </style>
</head>
<body>

<!-- 좌측 사이드바 -->
<div class="sidebar">
    <h2>채팅방 목록</h2>
    <div class="chatroom-list" id="chatroomList"></div>
    <button class="new-chatroom-btn" onclick="createNewChatroom()">+ 새 채팅방</button>
</div>

<!-- 채팅창 -->
<div class="chat-container">
    <div class="chat-header">TRENDB</div>
    <div class="chat-box" id="messagesContainer"></div>
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="메시지를 입력하세요" onkeypress="handleKeyPress(event)" />
        <button onclick="sendMessage()">전송</button>
    </div>
</div>

<script>
    function getAuthToken() {
        return localStorage.getItem("accessToken");
    }

    async function getNewAccessToken() {
        const refreshToken = localStorage.getItem("refreshToken");
        if (!refreshToken) { logout(); return null; }

        try {
            const response = await fetch("http://localhost:8080/api/token", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ refreshToken }),
            });

            if (!response.ok) { logout(); return null; }

            const data = await response.json();
            localStorage.setItem("accessToken", data.accessToken);
            return data.accessToken;
        } catch (error) { logout(); return null; }
    }

    async function requestWithAuth(url, options = {}) {
        let token = getAuthToken();
        options.headers = options.headers || {};
        options.headers["Authorization"] = `Bearer ${token}`;

        let response = await fetch(url, options);
        if (response.status === 401) {
            token = await getNewAccessToken();
            if (!token) return response;
            options.headers["Authorization"] = `Bearer ${token}`;
            response = await fetch(url, options);
        }
        return response;
    }

    async function loadChatrooms() {
        const token = getAuthToken();
        if (!token) return alert("로그인이 필요합니다.");

        const response = await requestWithAuth('http://localhost:8080/api/chatbot/chatrooms', {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`채팅방 로딩 실패: ${errorText}`);
        }

        const chatrooms = await response.json();
        const chatroomList = document.getElementById('chatroomList');
        chatroomList.innerHTML = '';

        chatrooms.forEach(chatroom => {
            const div = document.createElement('div');
            div.classList.add('chatroom-item');
            div.setAttribute("data-chatroom-id", chatroom.id);
            div.style.display = "flex";
            div.style.alignItems = "center";
            div.style.justifyContent = "space-between";

            const chatroomText = document.createElement('span');
            chatroomText.textContent = `채팅방 #${chatroom.id}`;
            chatroomText.style.flex = "1";
            chatroomText.style.cursor = "pointer";
            chatroomText.onclick = () => loadChatMessages(chatroom.id);

            // 삭제 버튼 추가 (아이콘 형태 개선)
            const deleteBtn = document.createElement('button');
            deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
            deleteBtn.style.marginLeft = "10px";
            deleteBtn.style.cursor = "pointer";
            deleteBtn.style.border = "none";
            deleteBtn.style.background = "transparent";
            deleteBtn.style.color = "#ff4d4d";
            deleteBtn.style.fontSize = "1.2em";
            deleteBtn.style.padding = "5px";
            deleteBtn.onclick = (event) => {
                event.stopPropagation(); // 채팅방 클릭 이벤트 방지
                deleteChatRoom(chatroom.id);
            };

            div.appendChild(chatroomText);
            div.appendChild(deleteBtn);
            chatroomList.appendChild(div);
        });
    }

    async function deleteChatRoom(chatroomId) {
        const token = getAuthToken();
        if (!token) {
            alert("로그인이 필요합니다.");
            return;
        }

        if (!confirm("이 채팅방과 관련된 모든 메시지가 삭제됩니다. 계속하시겠습니까?")) {
            return;
        }

        try {
            const response = await requestWithAuth(`http://localhost:8080/api/chatbot/chatroom/${chatroomId}`, {
                method: "DELETE",
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`채팅방 삭제 실패: ${errorText}`);
            }

            alert("채팅방과 관련된 모든 메시지가 삭제되었습니다.");
            loadChatrooms(); // 채팅방 목록 갱신
        } catch (error) {
            console.error("🚨 채팅방 삭제 오류:", error);
            alert(`채팅방을 삭제할 수 없습니다.\n오류 메시지: ${error.message}`);
        }
    }

    async function loadChatMessages(chatroomId) {
        const token = getAuthToken();
        if (!token) return alert("로그인이 필요합니다.");

        currentChatroomId = chatroomId;
        document.querySelector('.chat-header').textContent = `채팅방 #${chatroomId}`;
        document.querySelectorAll('.chatroom-item').forEach(item => item.classList.remove('active'));

        const chatroomElement = document.querySelector(`[data-chatroom-id="${chatroomId}"]`);
        if (chatroomElement) chatroomElement.classList.add('active');

        window.history.pushState(null, "", `/chat/${chatroomId}`);

        try {
            const response = await requestWithAuth(`http://localhost:8080/api/chatbot/chatroom/${chatroomId}/messages`, {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!response.ok) throw new Error("채팅 메시지 불러오기 실패");

            const messages = await response.json();
            const chatBox = document.getElementById('messagesContainer');
            chatBox.innerHTML = ''; // 이전 메시지 초기화

            messages.forEach(msg => {
                // 사용자 메시지 추가
                const userWrapper = document.createElement('div');
                userWrapper.classList.add('message-wrapper', 'user');

                const userMessage = document.createElement('div');
                userMessage.classList.add('message', 'user');
                userMessage.textContent = msg.message;

                userWrapper.appendChild(userMessage);
                chatBox.appendChild(userWrapper);

                // 봇 응답 메시지 추가 (response가 있을 경우)
                if (msg.response) {
                    const botWrapper = document.createElement('div');
                    botWrapper.classList.add('message-wrapper', 'bot');

                    const botMessage = document.createElement('div');
                    botMessage.classList.add('message', 'bot');
                    botMessage.textContent = msg.response;

                    botWrapper.appendChild(botMessage);
                    chatBox.appendChild(botWrapper);
                }
            });

            chatBox.scrollTop = chatBox.scrollHeight; // 스크롤 자동 하단 이동
        } catch (error) {
            console.error("채팅방 메시지 불러오기 오류:", error);
        }
    }

    function displayMessage(text, sender) {
        const chatBox = document.getElementById('messagesContainer');

        // 메시지 감싸는 div
        const messageWrapper = document.createElement('div');
        messageWrapper.classList.add('message-wrapper', sender);

        // 메시지 말풍선 div
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', sender);
        messageDiv.textContent = text;

        // messageWrapper에 메시지 추가 후, chatBox에 추가
        messageWrapper.appendChild(messageDiv);
        chatBox.appendChild(messageWrapper);

        // 스크롤 자동 하단 이동
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const message = input.value.trim();
        if (!message) return;

        const token = getAuthToken();
        if (!token) {
            alert("로그인이 필요합니다.");
            return;
        }

        const chatroomId = currentChatroomId;
        if (!chatroomId) {
            alert("채팅방을 선택하세요.");
            return;
        }

        const requestBody = { query: message };

        console.log("📡 전송 데이터:", requestBody);

        try {
            const response = await requestWithAuth(`http://localhost:8080/api/chatbot/chatroom/${chatroomId}/query`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify(requestBody)
            });

            let responseText = await response.text();
            console.log("✅ 서버 응답 원본:", responseText);

            if (!response.ok) {
                console.error("🚨 서버 응답 오류:", response.status, responseText);
                alert(`메시지 전송 실패 (HTTP ${response.status}): ${responseText}`);
                return;
            }

            let responseData;
            try {
                responseData = JSON.parse(responseText);
            } catch (jsonError) {
                console.error("🚨 JSON 파싱 오류:", jsonError, responseText);
                alert(`서버 응답을 처리할 수 없습니다.\n응답 내용: ${responseText}`);
                return;
            }

            console.log("✅ 서버 응답 파싱 완료:", responseData);

            // 사용자 메시지 추가
            displayMessage(message, "user");

            // GPT 응답 추가
            if (responseData.results?.gpt_response) {
                displayMessage(responseData.results.gpt_response, "bot");
            }

            // 검색 결과 추가
            if (responseData.results?.search_results && responseData.results.search_results.length > 0) {
                responseData.results.search_results.forEach(result => {
                    displayMessage(`🔎 ${result.title} - ${result.url}`, "bot");
                });
            }

            input.value = "";
        } catch (error) {
            console.error("🚨 네트워크 오류:", error);
            alert(`서버와 연결할 수 없습니다.\n오류 메시지: ${error.message}`);
        }
    }
    function displayTypingEffect(text, sender) {
        const chatBox = document.getElementById('messagesContainer');

        // 메시지 감싸는 div
        const messageWrapper = document.createElement('div');
        messageWrapper.classList.add('message-wrapper', sender);

        // 메시지 말풍선 div
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', sender);
        messageWrapper.appendChild(messageDiv);
        chatBox.appendChild(messageWrapper);

        let i = 0;
        function typeEffect() {
            if (i < text.length) {
                messageDiv.textContent += text[i];
                i++;
                setTimeout(typeEffect, 20); // 한 글자씩 출력 (20ms 간격)
            }
        }
        typeEffect();

        chatBox.scrollTop = chatBox.scrollHeight; // 스크롤 자동 하단 이동
    }


    function displaySearchResults(results) {
        const chatBox = document.getElementById('messagesContainer');

        const details = document.createElement('details');
        details.style.border = "1px solid #ccc";
        details.style.borderRadius = "8px";
        details.style.padding = "10px";
        details.style.marginTop = "10px";
        details.style.background = "#f9f9f9";
        details.style.cursor = "pointer";
        details.style.transition = "0.3s";

        const summary = document.createElement('summary');
        summary.textContent = '🔎 검색 결과 보기';
        summary.style.fontWeight = "600";
        summary.style.padding = "5px 0";

        details.appendChild(summary);

        results.forEach(result => {
            const resultDiv = document.createElement('div');
            resultDiv.innerHTML = `<a href="${result.url}" target="_blank" style="color:#0077cc; text-decoration:none;">${result.title}</a>`;
            resultDiv.style.padding = "5px 10px";
            details.appendChild(resultDiv);
        });

        chatBox.appendChild(details);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            sendMessage();
        }
    });

    async function createNewChatroom() {
        const token = getAuthToken();
        if (!token) {
            alert("로그인이 필요합니다.");
            return;
        }

        try {
            const response = await requestWithAuth("http://localhost:8080/api/chatbot/chatroom", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json"
                }
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`채팅방 생성 실패: ${errorText}`);
            }

            const chatroom = await response.json();
            console.log("✅ 새 채팅방 생성 완료:", chatroom);

            // 채팅방 목록 갱신
            loadChatrooms();

            // 새 채팅방 자동 선택
            loadChatMessages(chatroom.id);
        } catch (error) {
            console.error("🚨 새 채팅방 생성 오류:", error);
            alert(`새 채팅방을 생성할 수 없습니다.\n오류 메시지: ${error.message}`);
        }
    }

    document.addEventListener("DOMContentLoaded", loadChatrooms);
</script>

</body>
</html>
