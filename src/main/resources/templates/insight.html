<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>국내 키워드 인사이트</title>
    <!-- WordCloud 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.min.js"></script>
    <!-- Chart.js 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 90%;
            max-width: 1400px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #5B55D7;
            display: flex;
            align-items: center;
        }
        h1 img {
            width: 24px;
            margin-right: 10px;
        }
        .section {
            margin-top: 30px;
        }
        .charts-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .chart-container {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            height: 350px;  /* 고정 높이 지정 */
            padding: 10px;
            box-sizing: border-box;
        }
        canvas {
            width: 100%;
            height: 100%;
        }
        #word-cloud {
            height: 300px;  /* 워드 클라우드 높이 지정 */
            background: #fff;
            border-radius: 10px;
            margin-top: 20px;
        }
        #search-results div {
            margin-bottom: 10px;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        /* 모달 스타일 (기사 결과용) */
        .modal {
            display: none; /* 기본 숨김 */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            border-radius: 10px;
            max-height: 80%;
            overflow-y: auto;
        }
        .close-btn {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-btn:hover,
        .close-btn:focus {
            color: #000;
            text-decoration: none;
        }
        /* 더보기 버튼 및 컨테이너 스타일 */
        #load-more-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }
        #load-more-btn {
            background-color: #5B55D7;
            color: #fff;
            border-radius: 5px;
            border: none;
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        #load-more-btn:hover {
            background-color: #4a45c4;
        }
        #load-more-btn:active {
            transform: scale(0.95);
        }
        /* 탭 메뉴 스타일 */
        .tab-menu {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .tab-menu a {
            padding: 10px 20px;
            margin: 0 5px;
            text-decoration: none;
            color: #333;
            background-color: #f0f0f0;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .tab-menu a.active {
            background-color: #5B55D7;
            color: white;
        }
        .tab-menu a:hover {
            background-color: #ddd;
        }
        .tab-menu a.active:hover {
            background-color: #4a45c4;
        }
        /* 키워드 검색 섹션 스타일 */
        .search-section {
            margin-top: 30px;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        .search-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .search-form input, .search-form select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            flex-grow: 1;
        }
        
        .search-form button {
            background-color: #5B55D7;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .search-form button:hover {
            background-color: #4a45c4;
        }
        
        .search-results {
            max-height: 500px;
            overflow-y: auto;
        }
        
        .article-item {
            display: flex;
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            transition: box-shadow 0.3s;
        }
        
        .article-item:hover {
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        .article-thumbnail {
            width: 150px;
            min-width: 150px;
            height: 120px;
            margin-right: 15px;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
        }
        
        .article-content {
            flex: 1;
        }
        
        .article-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            cursor: pointer;
            color: #333;
        }
        
        .article-title:hover {
            color: #5B55D7;
        }
        
        .article-meta {
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .article-category {
            background-color: #f0f0f0;
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 12px;
        }
        
        .article-summary {
            font-size: 14px;
            color: #555;
            line-height: 1.4;
        }
        
        .category-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .category-badge {
            background-color: #f0f0f0;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .category-badge:hover, .category-badge.active {
            background-color: #5B55D7;
            color: white;
        }
        .article-sentiment {
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 12px;
            margin-left: 10px;
        }
        .article-sentiment.positive {
            background-color: #e6f4ea;
            color: #137333;
        }
        .article-sentiment.negative {
            background-color: #fce8e6;
            color: #c5221f;
        }
        .article-sentiment.neutral {
            background-color: #f1f3f4;
            color: #5f6368;
        }
        /* 추가된 스타일 */
        .period-toggle {
            display: flex;
            gap: 10px;
        }
        
        .period-btn {
            background-color: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .period-btn.active {
            background-color: #5B55D7;
            color: white;
        }
        
        .period-selector {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        <img src="https://img.icons8.com/ios-filled/50/5B55D7/south-korea.png" /> 국내 키워드 인사이트
    </h1>
    
    <!-- 탭 메뉴 추가 -->
    <div class="tab-menu">
        <a href="/insight-view" class="active">국내 인사이트</a>
        <a href="/foreign-insight-view">해외 인사이트</a>
    </div>
    
    <label for="date">날짜 선택:</label>
    <input type="date" id="date" />
    <button onclick="loadAllData()">조회</button>

    <!-- 키워드 기반 기사 검색 섹션 (일간 데이터 섹션 위로 이동) -->
    <div class="search-section" id="search-section">
        <h2>키워드 기반 기사 검색</h2>
        
        <div class="category-list" id="category-list">
            <!-- 카테고리는 JavaScript로 동적 로드, 전체 카테고리는 항상 존재 -->
            <div class="category-badge active" id="all-category" data-category="">전체</div>
        </div>
        
        <div class="search-form">
            <input type="text" id="search-keyword" placeholder="검색할 키워드 입력" />
            <input type="date" id="search-start-date" />
            <input type="date" id="search-end-date" />
            <select id="search-category">
                <option value="">카테고리 선택 (전체)</option>
                <!-- 카테고리는 JavaScript로 동적 로드 -->
            </select>
            <button onclick="searchArticles()">검색</button>
        </div>
        
        <!-- 긍/부정 비율 차트 추가 -->
        <div id="sentiment-chart-container" style="display: none; margin-bottom: 20px;">
            <h3>키워드 감정분석 결과</h3>
            <div style="display: flex; flex-wrap: wrap; align-items: center; min-height: 150px;">
                <div style="flex: 2; min-width: 300px; max-width: 600px; height: 100px;">
                    <canvas id="sentiment-chart"></canvas>
                </div>
                <div id="sentiment-stats" style="flex: 1; margin-left: 20px; min-width: 200px; padding: 10px;">
                    <!-- 감정 분석 통계는 JavaScript로 동적 로드 -->
                </div>
            </div>
        </div>
        
        <div class="search-results" id="search-results">
            <!-- 검색 결과는 JavaScript로 동적 로드 -->
        </div>
    </div>

    <!-- 일간 데이터 섹션 -->
    <div class="section" id="daily-section">
        <h2>일간 데이터</h2>
        <div class="charts-wrapper">
            <div class="chart-container">
                <canvas id="daily-keyword-chart"></canvas>
                <p style="text-align:center; font-weight:bold;">일간 키워드</p>
            </div>
            <div class="chart-container">
                <canvas id="daily-related-chart"></canvas>
                <p style="text-align:center; font-weight:bold;">일간 연관 키워드</p>
            </div>
        </div>
    </div>

    <!-- 주간 데이터 섹션 -->
    <div class="section" id="weekly-section">
        <h2>주간 데이터</h2>
        <p id="weekly-date-range" style="text-align:center; font-weight:bold;"></p>
        <div class="charts-wrapper">
            <div class="chart-container">
                <canvas id="weekly-keyword-chart"></canvas>
                <p style="text-align:center; font-weight:bold;">주간 키워드</p>
            </div>
            <div class="chart-container">
                <canvas id="weekly-related-chart"></canvas>
                <p style="text-align:center; font-weight:bold;">주간 연관 키워드</p>
            </div>
        </div>
    </div>

    <!-- 경쟁사 분석 섹션 -->
    <div class="section" id="competitors-section">
        <h2>경쟁사 분석</h2>
        
        <!-- 기간 선택 영역 -->
        <div class="competitors-form" style="margin-bottom: 20px;">
            <!-- 일간/주간/월간 토글 -->
            <div class="period-toggle" style="margin-bottom: 15px;">
                <button id="daily-toggle" class="period-btn active" onclick="setPeriodMode('daily')">일간</button>
                <button id="weekly-toggle" class="period-btn" onclick="setPeriodMode('weekly')">주간</button>
                <button id="monthly-toggle" class="period-btn" onclick="setPeriodMode('monthly')">월간</button>
            </div>
            
            <!-- 일간 모드 캘린더 -->
            <div id="daily-selector" class="period-selector">
                <label for="comp-date">날짜 선택:</label>
                <input type="date" id="comp-date" style="margin-right: 10px;" />
            </div>
            
            <!-- 주간 모드 선택기 -->
            <div id="weekly-selector" class="period-selector" style="display: none;">
                <label for="comp-week-month">월 선택:</label>
                <select id="comp-week-month" style="margin-right: 10px;">
                    <option value="1">1월</option>
                    <option value="2">2월</option>
                    <option value="3">3월</option>
                    <option value="4">4월</option>
                    <option value="5">5월</option>
                    <option value="6">6월</option>
                    <option value="7">7월</option>
                    <option value="8">8월</option>
                    <option value="9">9월</option>
                    <option value="10">10월</option>
                    <option value="11">11월</option>
                    <option value="12">12월</option>
                </select>
                <label for="comp-week">주 선택:</label>
                <select id="comp-week" style="margin-right: 10px;">
                    <option value="1">1주차</option>
                    <option value="2">2주차</option>
                    <option value="3">3주차</option>
                    <option value="4">4주차</option>
                    <option value="5">5주차</option>
                </select>
            </div>
            
            <!-- 월간 모드 선택기 -->
            <div id="monthly-selector" class="period-selector" style="display: none;">
                <label for="comp-month">월 선택:</label>
                <select id="comp-month" style="margin-right: 10px;">
                    <option value="1">1월</option>
                    <option value="2">2월</option>
                    <option value="3">3월</option>
                    <option value="4">4월</option>
                    <option value="5">5월</option>
                    <option value="6">6월</option>
                    <option value="7">7월</option>
                    <option value="8">8월</option>
                    <option value="9">9월</option>
                    <option value="10">10월</option>
                    <option value="11">11월</option>
                    <option value="12">12월</option>
                </select>
            </div>
            
            <button onclick="loadCompetitorsData()">분석</button>
        </div>
        
        <!-- 경쟁사 언급량 분석 차트 -->
        <div class="charts-wrapper">
            <div class="chart-container">
                <canvas id="competitors-mention-chart"></canvas>
                <p style="text-align:center; font-weight:bold;">언급량 비율</p>
            </div>
            <div class="chart-container">
                <canvas id="competitors-sentiment-chart"></canvas>
                <p style="text-align:center; font-weight:bold;">경쟁사별 감성 분석</p>
            </div>
        </div>
    </div>

    <!-- 오른쪽 패널: 워드 클라우드 및 기사 결과 (모달 표시용) -->
    <div class="section" id="results-section">
        <h2>워드 클라우드</h2>
        <div id="word-cloud"></div>
        <h2>기사 결과</h2>
        <p>기사 결과는 모달 창으로 표시됩니다.</p>
    </div>
</div>

<!-- 모달 창: 기사 결과 표시 -->
<div id="article-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <div id="modal-articles"></div>
    </div>
</div>

<script>
    // 전역 변수 선언
    const PAGE_SIZE = 10;
    let ALL_ARTICLES = [];
    let displayedCount = 0;

    let dailyChart = null;
    let dailyRelatedChart = null;
    let weeklyChart = null;
    let weeklyRelatedChart = null;
    let wordCloudInstance = null;

    let currentDailyKeyword = '';
    let currentWeeklyKeyword = '';
    let currentRelatedKeyword = '';
    let currentSearchPage = 0;

    let DAILY_DATA = [];
    let WEEKLY_DATA = {};

    let sentimentChart = null;

    // 경쟁사 컨트롤러 관련 변수와 함수
    let currentPeriodMode = 'daily';
    let competitorsData = null;

    // 기간 모드 설정 (일간/주간/월간)
    function setPeriodMode(mode) {
        currentPeriodMode = mode;
        
        // 토글 버튼 상태 업데이트
        document.getElementById('daily-toggle').classList.toggle('active', mode === 'daily');
        document.getElementById('weekly-toggle').classList.toggle('active', mode === 'weekly');
        document.getElementById('monthly-toggle').classList.toggle('active', mode === 'monthly');
        
        // 선택기 표시/숨김 처리
        document.getElementById('daily-selector').style.display = mode === 'daily' ? 'block' : 'none';
        document.getElementById('weekly-selector').style.display = mode === 'weekly' ? 'block' : 'none';
        document.getElementById('monthly-selector').style.display = mode === 'monthly' ? 'block' : 'none';
    }

    // 선택된 날짜 범위 계산
    function getSelectedDateRange() {
        const year = new Date().getFullYear();
        
        if (currentPeriodMode === 'daily') {
            // 일간 모드
            const date = document.getElementById('comp-date').value;
            if (!date) return null;
            
            return {
                startDate: date,
                endDate: date,
                period: 'daily'
            };
        } else if (currentPeriodMode === 'weekly') {
            // 주간 모드
            const month = parseInt(document.getElementById('comp-week-month').value);
            const week = parseInt(document.getElementById('comp-week').value);
            
            // 해당 월의 첫 날
            const firstDayOfMonth = new Date(year, month - 1, 1);
            
            // 주차에 따른 날짜 계산
            const startOffset = (week - 1) * 7;
            const startDate = new Date(year, month - 1, 1 + startOffset);
            const endDate = new Date(year, month - 1, 7 + startOffset);
            
            // 월을 넘어가는 경우 조정
            if (endDate.getMonth() !== month - 1) {
                // 해당 월의 마지막 날로 설정
                endDate.setDate(0);
            }
            
            return {
                startDate: startDate.toISOString().split('T')[0],
                endDate: endDate.toISOString().split('T')[0],
                period: 'weekly'
            };
        } else {
            // 월간 모드
            const month = parseInt(document.getElementById('comp-month').value);
            
            // 해당 월의 첫 날
            const startDate = new Date(year, month - 1, 1);
            
            // 해당 월의 마지막 날
            const endDate = new Date(year, month, 0);
            
            return {
                startDate: startDate.toISOString().split('T')[0],
                endDate: endDate.toISOString().split('T')[0],
                period: 'monthly'
            };
        }
    }

    // 일간 키워드 데이터 조회
    async function fetchDailyData(date) {
        const res = await fetch(`http://localhost:8080/api/insight?date=${date}`);
        const data = await res.json();
        return data.top_keywords || [];
    }

    // 주간 키워드 데이터 조회
    async function fetchWeeklyData(date) {
        const res = await fetch(`http://localhost:8080/api/insight/weekly?date=${date}`);
        const data = await res.json();
        return {
            range_start: data.range_start,
            range_end: data.range_end,
            keywords: data.top_weekly_keywords || []
        };
    }

    // 관련 기사 전체 목록을 한 번에 가져오기
    async function fetchRelatedArticles(keyword, relatedKeyword, startDate, endDate) {
        try {
            const url = `http://localhost:8080/api/insight/related-search-range`
                + `?keyword=${encodeURIComponent(keyword)}`
                + `&relatedKeyword=${encodeURIComponent(relatedKeyword)}`
                + `&startDate=${startDate}`
                + `&endDate=${endDate}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(res.statusText);
            const data = await res.json();
            return data.hits || [];
        } catch (e) {
            console.error("관련 기사 조회 실패:", e);
            return [];
        }
    }

    // 모달에 기사 목록을 렌더링
    function renderModalArticles(append = false) {
        const container = document.getElementById("modal-articles");
        if (!append) {
            container.innerHTML = "";
            displayedCount = Math.min(PAGE_SIZE, ALL_ARTICLES.length);
        }

        const slice = ALL_ARTICLES.slice(append ? displayedCount - PAGE_SIZE : 0, displayedCount);
        slice.forEach(article => {
            const div = document.createElement("div");
            div.style = "display:flex;align-items:center;margin-bottom:20px;padding:10px;border:1px solid #ddd;border-radius:10px;";
            div.innerHTML = `
                ${article.image_url ? `<img src="${article.image_url}" style="width:200px;height:150px;object-fit:cover;border-radius:8px;margin-right:20px;">` : ""}
                <div style="flex:1">
                    <h3 style="cursor:pointer;" onclick="window.open('${article.url}','_blank')">${article.title}</h3>
                    <p style="font-size:13px;color:#999;margin-bottom:10px;">
                        언론사: ${article.media_company} | 게시일: ${article.date}
                    </p>
                    <p style="font-size:14px;color:#555;">${article.highlights.join(' ')}</p>
                </div>`;
            container.appendChild(div);
        });

        // 더보기 버튼 관리
        let btn = document.getElementById("load-more-btn");
        if (displayedCount < ALL_ARTICLES.length) {
            if (!btn) {
                btn = document.createElement("button");
                btn.id = "load-more-btn";
                btn.textContent = "더보기";
                btn.style = "background:#5B55D7;color:#fff;border:none;padding:8px 15px;border-radius:5px;cursor:pointer;margin-top:10px;";
                btn.onclick = () => {
                    displayedCount = Math.min(displayedCount + PAGE_SIZE, ALL_ARTICLES.length);
                    renderModalArticles(true);
                };

    // 워드 클라우드 렌더링
    function renderWordCloud(keyword, relatedKeywords) {
        const wordCloudElement = document.getElementById('word-cloud');
        if (!relatedKeywords || relatedKeywords.length === 0) {
            wordCloudElement.innerHTML = '<p>워드 클라우드 데이터가 없습니다.</p>';
            return;
        }
        const wordList = relatedKeywords.map(k => [k.relatedKeyword, k.frequency || 10]);
        const minSize = 30, maxSize = 100;
        const freqs = relatedKeywords.map(k => k.frequency);
        const minFreq = Math.min(...freqs);
        const maxFreq = Math.max(...freqs);
        const weightFactorFn = function(size) {
            if (maxFreq === minFreq) return (minSize + maxSize) / 2;
            const normalized = (size - minFreq) / (maxFreq - minFreq);
            return minSize + normalized * (maxSize - minSize);
        };
        if (wordCloudInstance) wordCloudInstance.stop();
        wordCloudInstance = WordCloud(wordCloudElement, {
            list: wordList,
            gridSize: Math.round(20 * wordCloudElement.offsetWidth / 1024),
            weightFactor: weightFactorFn,
            fontFamily: 'Arial',
            color: () => `hsl(${Math.random()*360}, 70%, 50%)`,
            backgroundColor: '#fff',
            rotateRatio: 0,
            rotationSteps: 0,
        });
    }

    // 카테고리 목록 로드
    async function loadCategories() {
        try {
            const response = await fetch(`/api/insight/categories?foreign=false`);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const categories = await response.json();
            
            // 카테고리 목록 렌더링
            const categoryList = document.getElementById('category-list');
            const categorySelect = document.getElementById('search-category');
            
            // 기존 카테고리 제외하고 비우기
            Array.from(categoryList.children).forEach(child => {
                if (child.id !== 'all-category') {
                    child.remove();
                }
            });
            
            // 첫 번째 옵션을 제외하고 드롭다운 비우기
            while (categorySelect.options.length > 1) {
                categorySelect.remove(1);
            }
            
            // "전체" 카테고리 배지에 이벤트 리스너 추가
            const allCategoryBadge = document.getElementById('all-category');
            if (allCategoryBadge) {
                allCategoryBadge.addEventListener('click', () => {
                    // 모든 배지의 활성 상태 제거
                    document.querySelectorAll('.category-badge').forEach(b => b.classList.remove('active'));
                    // 전체 배지 활성화
                    allCategoryBadge.classList.add('active');
                    // 드롭다운 값 초기화
                    document.getElementById('search-category').value = '';
                });
            }
            
            // 카테고리 추가
            categories.forEach(category => {
                // 카테고리 배지 추가
                const badge = document.createElement('div');
                badge.className = 'category-badge';
                badge.textContent = `${category.name} (${category.count})`;
                badge.dataset.category = category.name;
                badge.addEventListener('click', () => {
                    // 다른 배지의 활성 상태 제거
                    document.querySelectorAll('.category-badge').forEach(b => b.classList.remove('active'));
                    // 현재 배지 활성화
                    badge.classList.add('active');
                    // 카테고리 선택
                    document.getElementById('search-category').value = category.name !== '일반' ? category.name : '';
                });
                categoryList.appendChild(badge);
                
                // 드롭다운 옵션 추가
                const option = document.createElement('option');
                option.value = category.name !== '일반' ? category.name : '';
                option.textContent = `${category.name} (${category.count})`;
                categorySelect.appendChild(option);
            });
        } catch (error) {
            console.error('카테고리 목록 로딩 중 오류 발생:', error);
        }
    }
    
    // 키워드 기반 기사 검색
    async function searchArticles() {
        const keyword = document.getElementById('search-keyword').value.trim();
        const startDate = document.getElementById('search-start-date').value;
        const endDate = document.getElementById('search-end-date').value;
        const category = document.getElementById('search-category').value;
        
        if (!keyword) {
            alert('검색할 키워드를 입력해주세요.');
            return;
        }
        
        if (!startDate || !endDate) {
            alert('검색 기간을 설정해주세요.');
            return;
        }
        
        try {
            // 기사 검색
            const searchUrl = new URL('/api/insight/search', window.location.origin);
            searchUrl.searchParams.append('keyword', keyword);
            searchUrl.searchParams.append('startDate', startDate);
            searchUrl.searchParams.append('endDate', endDate);
            searchUrl.searchParams.append('foreign', 'false');
            if (category) {
                searchUrl.searchParams.append('category', category);
            }
            
            const searchResponse = await fetch(searchUrl);
            if (!searchResponse.ok) throw new Error(`HTTP error! status: ${searchResponse.status}`);
            const searchData = await searchResponse.json();
            
            // 긍/부정 비율 분석 요청
            const sentimentUrl = new URL('/api/insight/sentiment-analysis', window.location.origin);
            sentimentUrl.searchParams.append('keyword', keyword);
            sentimentUrl.searchParams.append('startDate', startDate);
            sentimentUrl.searchParams.append('endDate', endDate);
            sentimentUrl.searchParams.append('foreign', 'false');
            if (category) {
                sentimentUrl.searchParams.append('category', category);
            }
            
            const sentimentResponse = await fetch(sentimentUrl);
            if (!sentimentResponse.ok) throw new Error(`HTTP error! status: ${sentimentResponse.status}`);
            const sentimentData = await sentimentResponse.json();
            
            // 검색 결과와 긍/부정 비율 차트 렌더링
            renderSearchResults(searchData);
            renderSentimentChart(sentimentData);
        } catch (error) {
            console.error('기사 검색 중 오류 발생:', error);
            document.getElementById('search-results').innerHTML = 
                `<p style="text-align: center; padding: 20px; color: #666;">검색 중 오류가 발생했습니다: ${error.message}</p>`;
            // 오류 시 감정 분석 차트 숨기기
            document.getElementById('sentiment-chart-container').style.display = 'none';
        }
    }
    
    // 검색 결과 렌더링
    function renderSearchResults(data) {
        const resultsContainer = document.getElementById('search-results');
        resultsContainer.innerHTML = '';
        
        if (!data.hits || data.hits.length === 0) {
            resultsContainer.innerHTML = 
                '<p style="text-align: center; padding: 20px; color: #666;">검색 결과가 없습니다.</p>';
            return;
        }
        
        data.hits.forEach(article => {
            const articleElement = document.createElement('div');
            articleElement.className = 'article-item';
            
            // 썸네일 이미지
            const thumbnailElement = document.createElement('div');
            thumbnailElement.className = 'article-thumbnail';
            thumbnailElement.style.backgroundImage = article.image_url ? 
                `url(${article.image_url})` : 
                'url(https://via.placeholder.com/150x120?text=No+Image)';
            articleElement.appendChild(thumbnailElement);
            
            // 기사 내용
            const contentElement = document.createElement('div');
            contentElement.className = 'article-content';
            
            // 제목
            const titleElement = document.createElement('div');
            titleElement.className = 'article-title';
            titleElement.innerHTML = article.title;
            titleElement.onclick = () => window.open(article.url, '_blank');
            contentElement.appendChild(titleElement);
            
            // 메타 정보
            const metaElement = document.createElement('div');
            metaElement.className = 'article-meta';
            
            const dateElement = document.createElement('span');
            dateElement.textContent = `${article.date || 'Unknown'}`;
            metaElement.appendChild(dateElement);
            
            const sourceElement = document.createElement('span');
            sourceElement.textContent = `출처: ${article.media_company || 'Unknown'}`;
            metaElement.appendChild(sourceElement);
            
            const categoryElement = document.createElement('span');
            categoryElement.className = 'article-category';
            categoryElement.textContent = article.category || '일반';
            metaElement.appendChild(categoryElement);
            
            // 긍부정 정보 추가
            if (article.sentiment) {
                const sentimentElement = document.createElement('span');
                sentimentElement.className = 'article-sentiment';
                let sentimentText = '';
                let sentimentClass = '';
                
                switch(article.sentiment) {
                    case 'positive':
                        sentimentText = '긍정';
                        sentimentClass = 'positive';
                        break;
                    case 'negative':
                        sentimentText = '부정';
                        sentimentClass = 'negative';
                        break;
                    case 'neutral':
                        sentimentText = '중립';
                        sentimentClass = 'neutral';
                        break;
                }
                
                sentimentElement.textContent = sentimentText;
                sentimentElement.classList.add(sentimentClass);
                metaElement.appendChild(sentimentElement);
            }
            
            contentElement.appendChild(metaElement);
            
            // 요약
            const summaryElement = document.createElement('div');
            summaryElement.className = 'article-summary';
            if (article.highlights && article.highlights.length > 0) {
                summaryElement.innerHTML = article.highlights.join(' ... ');
            } else {
                summaryElement.textContent = article.content ? 
                    (article.content.substring(0, 200) + '...') : 
                    '내용 없음';
            }
            contentElement.appendChild(summaryElement);
            
            articleElement.appendChild(contentElement);
            resultsContainer.appendChild(articleElement);
        });
        
        // 검색 결과 합계 표시
        const totalElement = document.createElement('div');
        totalElement.style.textAlign = 'right';
        totalElement.style.marginTop = '10px';
        totalElement.style.color = '#666';
        totalElement.textContent = `총 ${data.total || 0}개의 검색 결과 중 ${data.hits.length}개 표시`;
        resultsContainer.appendChild(totalElement);
    }

                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                let value = context.parsed.x;
                                
                                // 실제 건수도 표시
                                let count = 0;
                                if (context.dataset.label === '긍정') count = data.positive;
                                else if (context.dataset.label === '부정') count = data.negative;
                                else if (context.dataset.label === '중립') count = data.neutral;
                                
                                return `${label}: ${value}% (${count}건)`;
                            }
                        }
                    }
                }
            }
        });
    }
    
    // 오늘 날짜 기준으로 기본 날짜 설정
    function setDefaultDates() {
        const today = new Date();
        const lastMonth = new Date();
        lastMonth.setMonth(today.getMonth() - 1);
        
        document.getElementById('search-start-date').value = lastMonth.toISOString().split('T')[0];
        document.getElementById('search-end-date').value = today.toISOString().split('T')[0];
    }
    
    // 페이지 로드 시 초기화
    document.addEventListener("DOMContentLoaded", function() {
        setDefaultDates();
        loadCategories();
    });

    async function loadCompetitorsData() {
        const dateRange = getSelectedDateRange();
        
        if (!dateRange) {
            alert('분석 기간을 선택해주세요.');
            return;
        }
        
        try {
            // 경쟁사 언급량 데이터 로드
            const mentionData = await fetchCompetitorsMentionData(dateRange.startDate, dateRange.endDate, dateRange.period);
            competitorsData = mentionData; // 언급량 데이터 저장
            updateCompetitorsMentionChart(mentionData);
            
            // 경쟁사 감성 분석 데이터 로드
            const sentimentData = await fetchCompetitorsSentimentData(dateRange.startDate, dateRange.endDate);
            updateCompetitorsSentimentChart(sentimentData);
        } catch (error) {
            console.error('경쟁사 데이터 로드 중 오류 발생:', error);
            alert('경쟁사 데이터를 불러오는 중 오류가 발생했습니다.');
        }
    }
    
    // 경쟁사 언급량 데이터 조회
    async function fetchCompetitorsMentionData(startDate, endDate, period) {
        const res = await fetch(`http://localhost:8080/api/insight/competitors/mentions?startDate=${startDate}&endDate=${endDate}&period=${period}`);
        return await res.json();
    }
    
    // 경쟁사 감성 분석 데이터 조회
    async function fetchCompetitorsSentimentData(startDate, endDate) {
        const res = await fetch(`http://localhost:8080/api/insight/competitors/sentiment?startDate=${startDate}&endDate=${endDate}`);
        return await res.json();
    }
    
    // 경쟁사 언급량 차트 업데이트
    function updateCompetitorsMentionChart(data) {
        const ctx = document.getElementById('competitors-mention-chart').getContext('2d');
        
        // 기존 차트가 있다면 파괴
        if (window.competitorsMentionChart) {
            window.competitorsMentionChart.destroy();
        }
        
        // 데이터 준비
        const competitors = data.competitors || [];
        
        // 언급량 기준 내림차순 정렬 (이미 서버에서 정렬되어 있지만 한번 더 확인)
        competitors.sort((a, b) => b.article_count - a.article_count);
        
        const labels = competitors.map(comp => comp.name);
        const percentages = competitors.map(comp => comp.percentage);
        const articleCounts = competitors.map(comp => comp.article_count);
        
        // 상위 10개 경쟁사만 표시
        const topLabels = labels.slice(0, 10);
        const topPercentages = percentages.slice(0, 10);
        const topArticleCounts = articleCounts.slice(0, 10);
        
        // 차트 생성
        window.competitorsMentionChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: topLabels,
                datasets: [{
                    label: '언급량 비율 (%)',
                    data: topPercentages,
                    backgroundColor: 'rgba(54, 162, 235, 0.7)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: '언급량 비율 (%)'
                        }
                    }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const index = context.dataIndex;
                                return `${context.dataset.label}: ${context.parsed.y}% (${topArticleCounts[index]}건)`;
                            }
                        }
                    }
                }
            }
        });
    }
    
    // 경쟁사 감성 분석 차트 업데이트
    function updateCompetitorsSentimentChart(sentimentData) {
        const ctx = document.getElementById('competitors-sentiment-chart').getContext('2d');
        
        // 기존 차트가 있다면 파괴
        if (window.competitorsSentimentChart) {
            window.competitorsSentimentChart.destroy();
        }
        
        // 데이터 준비
        const sentimentCompetitors = sentimentData.competitors || [];
        
        // 언급량 데이터가 없으면 기본 정렬 사용
        if (!competitorsData || !competitorsData.competitors) {
            console.warn('언급량 데이터가 없어 기본 정렬을 사용합니다.');
            
            // 상위 8개 경쟁사만 표시 (화면 공간 제약)
            const topCompetitors = sentimentCompetitors.slice(0, 8);
            const labels = topCompetitors.map(comp => comp.name);
            
            renderSentimentChart(ctx, topCompetitors, labels);
            return;
        }
        
        // 언급량 순서대로 감성 분석 데이터 정렬
        const mentionCompetitors = competitorsData.competitors || [];
        
        // 언급량 기준 상위 8개 경쟁사 이름 추출
        const topMentionNames = mentionCompetitors
            .sort((a, b) => b.article_count - a.article_count)
            .slice(0, 8)
            .map(comp => comp.name);
        
        // 언급량 기준으로 정렬된 감성 분석 데이터 생성
        const sortedSentimentCompetitors = [];
        for (const name of topMentionNames) {
            const comp = sentimentCompetitors.find(c => c.name === name);
            if (comp) {
                sortedSentimentCompetitors.push(comp);
            }
        }
        
        // 차트 렌더링
        renderSentimentChart(ctx, sortedSentimentCompetitors, topMentionNames);
    }
    
    // 경쟁사 감성 분석 차트 렌더링 함수
    function renderSentimentChart(ctx, competitors, labels) {
        // 차트 생성
        window.competitorsSentimentChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '긍정',
                        data: competitors.map(comp => comp.positive_rate),
                        backgroundColor: 'rgba(75, 192, 192, 0.7)',
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 1
                    },
                    {
                        label: '중립',
                        data: competitors.map(comp => comp.neutral_rate),
                        backgroundColor: 'rgba(201, 203, 207, 0.7)',
                        borderColor: 'rgba(201, 203, 207, 1)',
                        borderWidth: 1
                    },
                    {
                        label: '부정',
                        data: competitors.map(comp => comp.negative_rate),
                        backgroundColor: 'rgba(255, 99, 132, 0.7)',
                        borderColor: 'rgba(255, 99, 132, 1)',
                        borderWidth: 1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        stacked: true,
                    },
                    y: {
                        stacked: true,
                        beginAtZero: true,
                        max: 100,
                        title: {
                            display: true,
                            text: '비율 (%)'
                        }
                    }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const index = context.dataIndex;
                                const datasetIndex = context.datasetIndex;
                                const comp = competitors[index];
                                
                                let count = 0;
                                let label = '';
                                
                                if (datasetIndex === 0) { // 긍정
                                    count = comp.positive_count;
                                    label = '긍정';
                                } else if (datasetIndex === 1) { // 중립
                                    count = comp.neutral_count;
                                    label = '중립';
                                } else { // 부정
                                    count = comp.negative_count;
                                    label = '부정';
                                }
                                
                                return `${label}: ${context.parsed.y}% (${count}건)`;
                            }
                        }
                    }
                }
            }
        });
    }
    
    // 페이지 로드 시 초기화
    document.addEventListener("DOMContentLoaded", function() {
        setDefaultDates();
        loadCategories();
        
        // 현재 날짜 기준 값 세팅
        const today = new Date();
        const currentMonth = today.getMonth() + 1;
        
        // 일간 모드 기본값
        document.getElementById('comp-date').value = today.toISOString().split('T')[0];
        
        // 주간 모드 기본값
        document.getElementById('comp-week-month').value = currentMonth;
        const currentWeek = Math.ceil(today.getDate() / 7);
        document.getElementById('comp-week').value = Math.min(currentWeek, 5);
        
        // 월간 모드 기본값
        document.getElementById('comp-month').value = currentMonth;
    });
</script>
</body>
</html>
