<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>키워드 인사이트</title>
    <!-- WordCloud 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.min.js"></script>
    <!-- Chart.js 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 90%;
            max-width: 1400px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #5B55D7;
            display: flex;
            align-items: center;
        }
        h1 img {
            width: 24px;
            margin-right: 10px;
        }
        .section {
            margin-top: 30px;
        }
        .charts-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .chart-container {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            height: 350px;  /* 고정 높이 지정 */
            padding: 10px;
            box-sizing: border-box;
        }
        canvas {
            width: 100%;
            height: 100%;
        }
        #word-cloud {
            height: 300px;  /* 워드 클라우드 높이 지정 */
            background: #fff;
            border-radius: 10px;
            margin-top: 20px;
        }
        #search-results div {
            margin-bottom: 10px;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        /* 모달 스타일 (기사 결과용) */
        .modal {
            display: none; /* 기본 숨김 */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            border-radius: 10px;
            max-height: 80%;
            overflow-y: auto;
        }
        .close-btn {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-btn:hover,
        .close-btn:focus {
            color: #000;
            text-decoration: none;
        }
        /* 더보기 버튼 및 컨테이너 스타일 */
        #load-more-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }
        #load-more-btn {
            background-color: #5B55D7;
            color: #fff;
            border-radius: 5px;
            border: none;
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        #load-more-btn:hover {
            background-color: #4a45c4;
        }
        #load-more-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        <img src="https://img.icons8.com/ios-filled/50/5B55D7/bar-chart.png" /> 키워드 인사이트
    </h1>
    <label for="date">날짜 선택:</label>
    <input type="date" id="date" />
    <button onclick="loadAllData()">조회</button>

    <!-- 일간 데이터 섹션 -->
    <div class="section" id="daily-section">
        <h2>일간 데이터</h2>
        <div class="charts-wrapper">
            <div class="chart-container">
                <canvas id="daily-keyword-chart"></canvas>
                <p style="text-align:center; font-weight:bold;">일간 키워드</p>
            </div>
            <div class="chart-container">
                <canvas id="daily-related-chart"></canvas>
                <p style="text-align:center; font-weight:bold;">일간 연관 키워드</p>
            </div>
        </div>
    </div>

    <!-- 주간 데이터 섹션 -->
    <div class="section" id="weekly-section">
        <h2>주간 데이터</h2>
        <p id="weekly-date-range" style="text-align:center; font-weight:bold;"></p>
        <div class="charts-wrapper">
            <div class="chart-container">
                <canvas id="weekly-keyword-chart"></canvas>
                <p style="text-align:center; font-weight:bold;">주간 키워드</p>
            </div>
            <div class="chart-container">
                <canvas id="weekly-related-chart"></canvas>
                <p style="text-align:center; font-weight:bold;">주간 연관 키워드</p>
            </div>
        </div>
    </div>

    <!-- 오른쪽 패널: 워드 클라우드 및 기사 결과 (모달 표시용) -->
    <div class="section" id="results-section">
        <h2>워드 클라우드</h2>
        <div id="word-cloud"></div>
        <h2>기사 결과</h2>
        <p>기사 결과는 모달 창으로 표시됩니다.</p>
    </div>
</div>

<!-- 모달 창: 기사 결과 표시 -->
<div id="article-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <div id="modal-articles"></div>
    </div>
</div>

<script>
    // 전역 변수 선언
    const PAGE_SIZE = 10;
    let ALL_ARTICLES = [];
    let displayedCount = 0;

    let dailyChart = null;
    let dailyRelatedChart = null;
    let weeklyChart = null;
    let weeklyRelatedChart = null;
    let wordCloudInstance = null;

    let currentDailyKeyword = '';
    let currentWeeklyKeyword = '';
    let currentRelatedKeyword = '';

    let DAILY_DATA = [];
    let WEEKLY_DATA = {};

    // 일간 키워드 데이터 조회
    async function fetchDailyData(date) {
        const res = await fetch(`http://localhost:8080/api/insight?date=${date}`);
        const data = await res.json();
        return data.top_keywords || [];
    }

    // 주간 키워드 데이터 조회
    async function fetchWeeklyData(date) {
        const res = await fetch(`http://localhost:8080/api/insight/weekly?date=${date}`);
        const data = await res.json();
        return {
            range_start: data.range_start,
            range_end: data.range_end,
            keywords: data.top_weekly_keywords || []
        };
    }

    // 관련 기사 전체 목록을 한 번에 가져오기
    async function fetchRelatedArticles(keyword, relatedKeyword, startDate, endDate) {
        try {
            const url = `http://localhost:8080/api/insight/related-search-range`
                + `?keyword=${encodeURIComponent(keyword)}`
                + `&relatedKeyword=${encodeURIComponent(relatedKeyword)}`
                + `&startDate=${startDate}`
                + `&endDate=${endDate}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(res.statusText);
            const data = await res.json();
            return data.hits || [];
        } catch (e) {
            console.error("관련 기사 조회 실패:", e);
            return [];
        }
    }

    // 모달에 기사 목록을 렌더링
    function renderModalArticles(append = false) {
        const container = document.getElementById("modal-articles");
        if (!append) {
            container.innerHTML = "";
            displayedCount = Math.min(PAGE_SIZE, ALL_ARTICLES.length);
        }

        const slice = ALL_ARTICLES.slice(append ? displayedCount - PAGE_SIZE : 0, displayedCount);
        slice.forEach(article => {
            const div = document.createElement("div");
            div.style = "display:flex;align-items:center;margin-bottom:20px;padding:10px;border:1px solid #ddd;border-radius:10px;";
            div.innerHTML = `
                ${article.image_url ? `<img src="${article.image_url}" style="width:200px;height:150px;object-fit:cover;border-radius:8px;margin-right:20px;">` : ""}
                <div style="flex:1">
                    <h3 style="cursor:pointer;" onclick="window.open('${article.url}','_blank')">${article.title}</h3>
                    <p style="font-size:13px;color:#999;margin-bottom:10px;">
                        언론사: ${article.media_company} | 게시일: ${article.date}
                    </p>
                    <p style="font-size:14px;color:#555;">${article.highlights.join(' ')}</p>
                </div>`;
            container.appendChild(div);
        });

        // 더보기 버튼 관리
        let btn = document.getElementById("load-more-btn");
        if (displayedCount < ALL_ARTICLES.length) {
            if (!btn) {
                btn = document.createElement("button");
                btn.id = "load-more-btn";
                btn.textContent = "더보기";
                btn.style = "background:#5B55D7;color:#fff;border:none;padding:8px 15px;border-radius:5px;cursor:pointer;margin-top:10px;";
                btn.onclick = () => {
                    displayedCount = Math.min(displayedCount + PAGE_SIZE, ALL_ARTICLES.length);
                    renderModalArticles(true);
                };
                container.appendChild(btn);
            }
        } else if (btn) {
            btn.remove();
        }
    }

    // 모달 열기
    function openArticlesModal(startDate, endDate) {
        fetchRelatedArticles(currentDailyKeyword, currentRelatedKeyword, startDate, endDate)
            .then(hits => {
                ALL_ARTICLES = hits;
                renderModalArticles(false);
                document.getElementById("article-modal").style.display = "block";
            });
    }

    function closeModal() {
        document.getElementById("article-modal").style.display = "none";
    }

    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('date').value = new Date(Date.now() - 86400000)
            .toISOString().split('T')[0];
        loadAllData();

        document.querySelector(".close-btn").addEventListener("click", closeModal);
        window.addEventListener("click", e => {
            if (e.target.id === "article-modal") closeModal();
        });
    });

    // 전체 데이터 로드
    async function loadAllData() {
        const date = document.getElementById('date').value;
        DAILY_DATA = await fetchDailyData(date);
        renderDailyKeywordChart(DAILY_DATA);
        if (DAILY_DATA.length > 0) {
            currentDailyKeyword = DAILY_DATA[0].keyword;
            renderDailyRelatedChart(DAILY_DATA[0].relatedKeywords);
            renderWordCloud(currentDailyKeyword, DAILY_DATA[0].relatedKeywords);
        }

        WEEKLY_DATA = await fetchWeeklyData(date);
        renderWeeklyKeywordChart(WEEKLY_DATA);
        if (WEEKLY_DATA.keywords.length > 0) {
            currentWeeklyKeyword = WEEKLY_DATA.keywords[0].keyword;
            renderWeeklyRelatedChart(WEEKLY_DATA.keywords[0].relatedKeywords);
        }
    }

    // 일간 키워드 막대 그래프 렌더링
    function renderDailyKeywordChart(keywords) {
        const ctx = document.getElementById('daily-keyword-chart').getContext('2d');
        const labels = keywords.map(item => item.keyword);
        const data = keywords.map(item => item.frequency);

        if (dailyChart) dailyChart.destroy();

        dailyChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '건수',
                    data: data,
                    backgroundColor: 'rgba(91,85,215,0.6)',
                    borderColor: 'rgba(91,85,215,1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: Math.ceil(Math.max(...data) / 10) } }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: (context) => {
                                const freq = context.parsed.y;
                                const rankChange = keywords[context.dataIndex].rankChange;
                                let rankStr = '';
                                if (rankChange === null) rankStr = " (NEW)";
                                else if (rankChange === 0) rankStr = " (-)";
                                else if (rankChange > 0) rankStr = ` (▲ ${rankChange})`;
                                else if (rankChange < 0) rankStr = ` (▼ ${Math.abs(rankChange)})`;
                                return `건수: ${freq}${rankStr}`;
                            }
                        },
                        backgroundColor: '#fff',
                        borderColor: '#5B55D7',
                        borderWidth: 2,
                        titleFont: { size: 16, weight: 'bold' },
                        bodyFont: { size: 14, weight: 'bold' },
                        titleColor: '#000',
                        bodyColor: '#000',
                        displayColors: false
                    }
                },
                onClick: (evt, activeElements) => {
                    if (activeElements.length > 0) {
                        const idx = activeElements[0].index;
                        currentDailyKeyword = keywords[idx].keyword;
                        // 일간 메인 키워드 클릭 시, 일간 연관 키워드 그래프와 워드 클라우드 업데이트
                        renderDailyRelatedChart(keywords[idx].relatedKeywords);
                        renderWordCloud(currentDailyKeyword, keywords[idx].relatedKeywords);
                    }
                }
            }
        });
    }

    // 일간 연관 키워드 막대 그래프 렌더링
    function renderDailyRelatedChart(relatedKeywords) {
        const ctx = document.getElementById('daily-related-chart').getContext('2d');
        if (!relatedKeywords || relatedKeywords.length === 0) {
            if (dailyRelatedChart) dailyRelatedChart.destroy();
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            ctx.font = "16px Arial";
            ctx.fillText("일간 연관 키워드 데이터가 없습니다.", 10, 50);
            return;
        }
        const labels = relatedKeywords.map(item => item.relatedKeyword);
        const data = relatedKeywords.map(item => item.frequency);

        if (dailyRelatedChart) dailyRelatedChart.destroy();

        dailyRelatedChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '건수',
                    data: data,
                    backgroundColor: 'rgba(255,159,64,0.6)',
                    borderColor: 'rgba(255,159,64,1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: Math.ceil(Math.max(...data) / 10) } }
                },
                plugins: { legend: { display: false } },
                onClick: (evt, activeElements) => {
                    if (activeElements.length > 0) {
                        const idx = activeElements[0].index;
                        currentRelatedKeyword = relatedKeywords[idx].relatedKeyword;
                        // 일간 메인 + 연관 키워드 선택 시, 범위 기반 기사 검색 (날짜를 같은 값으로 사용)
                        const date = document.getElementById('date').value;
                        fetchRelatedArticles(currentDailyKeyword, currentRelatedKeyword, date, date)
                            .then(newArticles => renderModalArticles(newArticles, false));
                    }
                }
            }
        });
    }

    // 주간 키워드 막대 그래프 렌더링
    function renderWeeklyKeywordChart(weeklyData) {
        const ctx = document.getElementById('weekly-keyword-chart').getContext('2d');
        const labels = weeklyData.keywords.map(item => item.keyword);
        const data = weeklyData.keywords.map(item => item.totalFrequency);

        document.getElementById('weekly-date-range').textContent =
            `${weeklyData.range_start} ~ ${weeklyData.range_end}`;

        if (weeklyChart) weeklyChart.destroy();

        weeklyChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '총 빈도수',
                    data: data,
                    backgroundColor: 'rgba(75,192,192,0.6)',
                    borderColor: 'rgba(75,192,192,1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: Math.ceil(Math.max(...data) / 10) } }
                },
                plugins: { legend: { display: false } },
                onClick: (evt, activeElements) => {
                    if (activeElements.length > 0) {
                        const idx = activeElements[0].index;
                        currentWeeklyKeyword = weeklyData.keywords[idx].keyword;
                        // 주간 메인 키워드 클릭 시, 주간 연관 키워드 그래프와 워드 클라우드 업데이트,
                        // 그리고 범위 기반 기사 검색: WEEKLY_DATA의 범위 사용
                        renderWeeklyRelatedChart(weeklyData.keywords[idx].relatedKeywords);
                        renderWordCloud(currentWeeklyKeyword, weeklyData.keywords[idx].relatedKeywords);
                    }
                }
            }
        });
    }

    // 주간 연관 키워드 막대 그래프 렌더링
    function renderWeeklyRelatedChart(relatedKeywords) {
        const ctx = document.getElementById('weekly-related-chart').getContext('2d');
        if (!relatedKeywords || relatedKeywords.length === 0) {
            if (weeklyRelatedChart) weeklyRelatedChart.destroy();
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            ctx.font = "16px Arial";
            ctx.fillText("주간 연관 키워드 데이터가 없습니다.", 10, 50);
            return;
        }
        const labels = relatedKeywords.map(item => item.relatedKeyword);
        const data = relatedKeywords.map(item => item.frequency);

        if (weeklyRelatedChart) weeklyRelatedChart.destroy();

        weeklyRelatedChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '건수',
                    data: data,
                    backgroundColor: 'rgba(153,102,255,0.6)',
                    borderColor: 'rgba(153,102,255,1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: Math.ceil(Math.max(...data) / 10) } }
                },
                plugins: { legend: { display: false } },
                onClick: (evt, activeElements) => {
                    if (activeElements.length > 0) {
                        const idx = activeElements[0].index;
                        currentRelatedKeyword = relatedKeywords[idx].relatedKeyword;
                        // 주간 메인 + 연관 키워드 선택 시, 범위 기반 기사 검색 (WEEKLY_DATA 범위 사용)
                        const { range_start, range_end } = WEEKLY_DATA;
                        fetchRelatedArticles(currentWeeklyKeyword, currentRelatedKeyword, range_start, range_end)
                            .then(newArticles => renderModalArticles(newArticles, false));
                    }
                }
            }
        });
    }

    // 워드 클라우드 렌더링
    function renderWordCloud(keyword, relatedKeywords) {
        const wordCloudElement = document.getElementById('word-cloud');
        if (!relatedKeywords || relatedKeywords.length === 0) {
            wordCloudElement.innerHTML = '<p>워드 클라우드 데이터가 없습니다.</p>';
            return;
        }
        const wordList = relatedKeywords.map(k => [k.relatedKeyword, k.frequency || 10]);
        const minSize = 30, maxSize = 100;
        const freqs = relatedKeywords.map(k => k.frequency);
        const minFreq = Math.min(...freqs);
        const maxFreq = Math.max(...freqs);
        const weightFactorFn = function(size) {
            if (maxFreq === minFreq) return (minSize + maxSize) / 2;
            const normalized = (size - minFreq) / (maxFreq - minFreq);
            return minSize + normalized * (maxSize - minSize);
        };
        if (wordCloudInstance) wordCloudInstance.stop();
        wordCloudInstance = WordCloud(wordCloudElement, {
            list: wordList,
            gridSize: Math.round(20 * wordCloudElement.offsetWidth / 1024),
            weightFactor: weightFactorFn,
            fontFamily: 'Arial',
            color: () => `hsl(${Math.random()*360}, 70%, 50%)`,
            backgroundColor: '#fff',
            rotateRatio: 0,
            rotationSteps: 0,
        });
    }

    // 모달 창을 이용한 기사 결과 렌더링 (더보기 버튼 포함)
    function renderModalArticles(articles, append = false) {
        const modalArticlesDiv = document.getElementById("modal-articles");

        // 항상 loadMoreContainer를 제거하여 새로 위치시킵니다.
        let existingContainer = document.getElementById('load-more-container');
        if (existingContainer) {
            existingContainer.remove();
        }

        if (!append) {
            modalArticlesDiv.innerHTML = '';
        }

        // 새 기사들을 추가
        articles.forEach(article => {
            const articleDiv = document.createElement('div');
            articleDiv.style.display = 'flex';
            articleDiv.style.alignItems = 'center';
            articleDiv.style.marginBottom = '20px';
            articleDiv.style.padding = '10px';
            articleDiv.style.border = '1px solid #ddd';
            articleDiv.style.borderRadius = '10px';

            if (article.image_url) {
                const imgDiv = document.createElement('div');
                imgDiv.style.marginRight = '20px';
                imgDiv.style.flexShrink = '0';
                const img = document.createElement('img');
                img.src = article.image_url;
                img.alt = article.title;
                img.style.width = '200px';
                img.style.height = '150px';
                img.style.objectFit = 'cover';
                img.style.borderRadius = '8px';
                imgDiv.appendChild(img);
                articleDiv.appendChild(imgDiv);
            }

            const textDiv = document.createElement('div');
            textDiv.style.flex = '1';
            const title = document.createElement('h3');
            title.innerHTML = article.title;
            title.style.cursor = 'pointer';
            title.onclick = () => window.open(article.url, '_blank');
            textDiv.appendChild(title);
            const meta = document.createElement('p');
            meta.style.fontSize = '13px';
            meta.style.color = '#999';
            meta.style.marginBottom = '10px';
            meta.innerHTML = `언론사: ${article.media_company} | 게시일: ${article.date}`;
            textDiv.appendChild(meta);
            const snippet = document.createElement('p');
            snippet.innerHTML = article.highlights.join(' ');
            snippet.style.fontSize = '14px';
            snippet.style.color = '#555';
            textDiv.appendChild(snippet);
            articleDiv.appendChild(textDiv);

            modalArticlesDiv.appendChild(articleDiv);
        });

        // 더보기 버튼 및 컨테이너 생성 (항상 새로 생성해서 맨 하단에 위치시키기)
        const loadMoreContainer = document.createElement('div');
        loadMoreContainer.id = 'load-more-container';
        loadMoreContainer.style.display = 'flex';
        loadMoreContainer.style.justifyContent = 'flex-end';
        loadMoreContainer.style.marginTop = '20px';

        // 새로 불러온 기사 수가 PAGE_SIZE 이상이면 버튼을 보여줌
        if (articles.length >= PAGE_SIZE) {
            let loadMoreBtn = document.createElement('button');
            loadMoreBtn.id = 'load-more-btn';
            loadMoreBtn.textContent = '더보기';
            loadMoreBtn.style.backgroundColor = '#5B55D7';
            loadMoreBtn.style.color = '#fff';
            loadMoreBtn.style.borderRadius = '5px';
            loadMoreBtn.style.border = 'none';
            loadMoreBtn.style.padding = '8px 15px';
            loadMoreBtn.style.fontSize = '14px';
            loadMoreBtn.style.cursor = 'pointer';
            loadMoreBtn.style.transition = 'background-color 0.3s ease, transform 0.2s ease';
            loadMoreBtn.addEventListener('click', () => {
                currentSearchPage++;
                const date = document.getElementById('date').value;
                // 여기서는 일간 데이터를 기준으로 호출 (필요에 따라 주간 데이터로 변경 가능)
                fetchRelatedArticlesRange(currentDailyKeyword, currentRelatedKeyword, date, date, currentSearchPage)
                    .then(newArticles => renderModalArticles(newArticles, true));
            });
            loadMoreContainer.appendChild(loadMoreBtn);
        }

        // loadMoreContainer를 항상 맨 아래에 붙임
        modalArticlesDiv.appendChild(loadMoreContainer);

        // 모달 창 열기
        openModal();
    }

    // 모달 열기/닫기 함수 및 이벤트 리스너
    function openModal() {
        document.getElementById("article-modal").style.display = "block";
    }

    function closeModal() {
        document.getElementById("article-modal").style.display = "none";
    }

    document.addEventListener("DOMContentLoaded", function() {
        document.getElementById('date').value = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        loadAllData();
        const closeBtn = document.querySelector(".close-btn");
        closeBtn.addEventListener("click", closeModal);
        window.addEventListener("click", function(event) {
            const modal = document.getElementById("article-modal");
            if (event.target === modal) {
                closeModal();
            }
        });
    });

    // 전체 데이터 로드: 일간 및 주간 데이터 각각 불러와 차트 업데이트
    async function loadAllData() {
        const date = document.getElementById('date').value;
        // 일간 데이터
        DAILY_DATA = await fetchDailyData(date);
        renderDailyKeywordChart(DAILY_DATA);
        if (DAILY_DATA.length > 0) {
            currentDailyKeyword = DAILY_DATA[0].keyword;
            renderDailyRelatedChart(DAILY_DATA[0].relatedKeywords);
            renderWordCloud(currentDailyKeyword, DAILY_DATA[0].relatedKeywords);
        } else {
            if (dailyChart) dailyChart.destroy();
            if (dailyRelatedChart) dailyRelatedChart.destroy();
        }
        // 주간 데이터
        WEEKLY_DATA = await fetchWeeklyData(date);
        renderWeeklyKeywordChart(WEEKLY_DATA);
        if (WEEKLY_DATA.keywords.length > 0) {
            currentWeeklyKeyword = WEEKLY_DATA.keywords[0].keyword;
            renderWeeklyRelatedChart(WEEKLY_DATA.keywords[0].relatedKeywords);
        } else {
            if (weeklyChart) weeklyChart.destroy();
            if (weeklyRelatedChart) weeklyRelatedChart.destroy();
        }
    }

    // 워드 클라우드 렌더링
    function renderWordCloud(keyword, relatedKeywords) {
        const wordCloudElement = document.getElementById('word-cloud');
        if (!relatedKeywords || relatedKeywords.length === 0) {
            wordCloudElement.innerHTML = '<p>워드 클라우드 데이터가 없습니다.</p>';
            return;
        }
        const wordList = relatedKeywords.map(k => [k.relatedKeyword, k.frequency || 10]);
        const minSize = 30, maxSize = 100;
        const freqs = relatedKeywords.map(k => k.frequency);
        const minFreq = Math.min(...freqs);
        const maxFreq = Math.max(...freqs);
        const weightFactorFn = function(size) {
            if (maxFreq === minFreq) return (minSize + maxSize) / 2;
            const normalized = (size - minFreq) / (maxFreq - minFreq);
            return minSize + normalized * (maxSize - minSize);
        };
        if (wordCloudInstance) wordCloudInstance.stop();
        wordCloudInstance = WordCloud(wordCloudElement, {
            list: wordList,
            gridSize: Math.round(20 * wordCloudElement.offsetWidth / 1024),
            weightFactor: weightFactorFn,
            fontFamily: 'Arial',
            color: () => `hsl(${Math.random()*360}, 70%, 50%)`,
            backgroundColor: '#fff',
            rotateRatio: 0,
            rotationSteps: 0,
        });
    }
</script>
</body>
