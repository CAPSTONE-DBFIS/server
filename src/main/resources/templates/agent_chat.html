<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRENDB 채팅</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js"></script>
  <style>
    /* 기본 스타일 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Nunito', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background-color: #f4f4f4;
      overflow: hidden;
    }

    /* ===================================
       상단바 (Header)
    =================================== */
    .header {
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
      width: 100%;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
      height: 70px;
    }

    .logo {
      font-size: 1.8em;
      font-weight: bold;
      color: #0a192f;
      cursor: pointer;
    }

    /* 네비게이션 메뉴 */
    .nav-menu {
      display: flex;
      list-style: none;
      gap: 20px;
    }

    .nav-menu a {
      text-decoration: none;
      font-size: 1.2em;
      color: #333;
      transition: color 0.3s ease;
    }

    .nav-menu a:hover {
      color: #0a192f;
    }

    /* 사용자 메뉴 */
    .user-menu {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .user-menu i {
      font-size: 1.5em;
      cursor: pointer;
      color: #555;
      transition: color 0.3s ease;
    }

    .user-menu i:hover {
      color: #0a192f;
    }

    .logout-btn {
      background: none;
      border: none;
      font-size: 1.2em;
      cursor: pointer;
      color: #555;
      transition: color 0.3s ease;
    }

    .logout-btn:hover {
      color: #0a192f;
    }

    /* ===================================
       전체 레이아웃 (메인 컨테이너)
    =================================== */
    .container {
      display: flex;
      flex: 1;
      width: 100%;
      height: 100vh;
      margin-top: 70px; /* 상단바 높이만큼 아래로 내리기 */
    }

    /* ===================================
       사이드바
    =================================== */
    .sidebar {
      width: 250px;
      background: #0a192f;
      color: white;
      display: flex;
      flex-direction: column;
      padding: 20px;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
      height: calc(100vh - 70px); /* 상단바 제외 */
      position: relative;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 600;
    }

    /* 채팅방 목록 */
    .chatroom-list {
      flex-grow: 1;
      overflow-y: auto;
      padding-bottom: 60px; /* 버튼 공간 확보 */
    }

    /* 채팅방 항목 */
    .chatroom-item {
      padding: 12px;
      background: #1a2b50;
      margin-bottom: 8px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chatroom-item:hover, .chatroom-item.active {
      background: #0088cc;
    }

    /* 채팅방 삭제 버튼 */
    .chatroom-item button {
      background: transparent;
      border: none;
      color: #ff4d4d;
      font-size: 1.2em;
      cursor: pointer;
      padding: 5px;
    }

    .chatroom-item button:hover {
      color: #ff2222;
    }

    /* 새 채팅방 버튼 */
    .new-chatroom-btn {
      background: #00aaff;
      color: white;
      border: none;
      padding: 12px;
      text-align: center;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1em;
      transition: background 0.3s ease;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
    }

    .new-chatroom-btn:hover {
      background: #0077aa;
    }

    /* ===================================
       채팅창
    =================================== */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      margin: auto;
      max-width: 700px;
      height: calc(100vh - 70px);
    }

    .chat-header {
      font-size: 1.8em;
      font-weight: 600;
      text-align: center;
      color: #333;
    }

    /* 채팅 메시지 박스 */
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      border-radius: 8px;
      background-color: #f9f9f9;
      font-size: 1.1em;
      word-wrap: break-word;
      white-space: pre-wrap;
      min-height: 100px;
    }

    /* 입력창 */
    .chat-input {
      display: flex;
      margin-top: 10px;
      padding: 10px;
      background: white;
      border-top: 1px solid #ddd;
    }

    .chat-input input {
      flex: 1;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1em;
      outline: none;
    }

    .chat-input button {
      background-color: #0a192f;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 15px 25px;
      margin-left: 10px;
      cursor: pointer;
      font-size: 1em;
      transition: background 0.3s ease;
    }

    .chat-input button:hover {
      background-color: #021024;
    }

    /* ===================================
       메시지 스타일
    =================================== */
    .messages-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
    }

    .message-wrapper {
      display: flex;
      justify-content: flex-start;
      width: 100%;
    }

    .message-wrapper.user {
      justify-content: flex-end;
    }

    .message {
      max-width: 60%;
      min-width: 120px;
      padding: 12px 16px;
      border-radius: 15px;
      font-size: 1rem;
      word-wrap: break-word;
      white-space: pre-wrap;
      display: inline-block;
    }

    .message.user {
      background-color: #0a192f;
      color: white;
      text-align: left;
      border-bottom-right-radius: 5px;
    }

    .message.bot {
      background-color: #e5e5ea;
      color: #333;
      text-align: left;
      border-bottom-left-radius: 5px;
    }

    /* ===================================
       로딩 스피너
    =================================== */
    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top: 3px solid #0a192f;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin: 5px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .tool-log {
      font-size: 0.85em;
      margin: 4px 0;
      padding: 4px 8px;
      border-radius: 8px;
      width: fit-content;
      max-width: 90%;
      word-wrap: break-word;
    }

    .tool-start {
      background-color: #e1f5fe;
      color: #0277bd;
    }

    .tool-end {
      background-color: #e8f5e9;
      color: #2e7d32;
    }

    .intermediate-log {
      background-color: #f5f5f5;
      color: #757575;
      font-style: italic;
    }

    .agent-log {
      color: #757575;
      font-style: italic;
      margin-top: 4px;
      font-size: 0.9rem;
      line-height: 1.4;
      word-break: break-word;
      white-space: pre-wrap;
      opacity: 0; /* 시작 시 투명 */
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .fade-in {
      animation: fadeIn 0.5s ease forwards;
    }

    .chat-box pre {
      position: relative;
      background-color: #282c34;
      color: #abb2bf;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
      font-family: Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
      margin: 8px 0;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .chat-box pre code {
      background: none;
      padding: 0;
      border-radius: 0;
    }

    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background-color: #0088cc;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 0.8em;
      opacity: 0.9;
      transition: background-color 0.3s, opacity 0.3s;
    }

    .copy-btn:hover {
      background-color: #0077b3;
      opacity: 1;
    }

    .copy-btn:active {
      background-color: #005f8c;
    }
  </style>
</head>
<body>
<header class="header">
  <div class="logo">TRENDB</div>
  <nav class="nav-menu">
    <a href="#">스코프</a>
    <a href="#">쓰레드</a>
    <a href="#">인사이트</a>
    <a href="#">커뮤니티</a>
  </nav>
  <div class="user-menu">
    <i class="fas fa-bell"></i>
    <button class="logout-btn" id="logout-button">로그아웃</button>
  </div>
</header>
<div class="container">
  <!-- 좌측 사이드바 -->
  <div class="sidebar">
    <h2>채팅방 목록</h2>
    <div class="chatroom-list" id="chatroomList"></div>
    <button class="new-chatroom-btn" onclick="createNewChatroom()">+ 새 채팅방</button>
  </div>

  <!-- 채팅창 -->
  <div class="chat-container">
    <div class="chat-header">TRENDB</div>
    <div class="chat-box" id="messagesContainer"></div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="메시지를 입력하세요"/>
      <button onclick="sendMessage()">전송</button>
    </div>
  </div>
</div>

<script>
  function getAuthToken() {
    return localStorage.getItem("accessToken");
  }

  async function getNewAccessToken() {
    const refreshToken = localStorage.getItem("refreshToken");
    if (!refreshToken) { logout(); return null; }

    try {
      const response = await fetch("http://localhost:8080/api/token", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ refreshToken }),
      });

      if (!response.ok) { logout(); return null; }

      const data = await response.json();
      localStorage.setItem("accessToken", data.accessToken);
      return data.accessToken;
    } catch (error) { logout(); return null; }
  }

  async function requestWithAuth(url, options = {}) {
    let token = getAuthToken();
    options.headers = options.headers || {};
    options.headers["Authorization"] = `Bearer ${token}`;

    let response = await fetch(url, options);
    if (response.status === 401) {
      token = await getNewAccessToken();
      if (!token) return response;
      options.headers["Authorization"] = `Bearer ${token}`;
      response = await fetch(url, options);
    }
    return response;
  }

  async function loadChatrooms() {
    const token = getAuthToken();
    if (!token) return alert("로그인이 필요합니다.");

    const response = await requestWithAuth('http://localhost:8080/api/chatbot/chatrooms', {
      method: 'GET',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!response.ok) {
      const errorText = await response.text();
      throw new Error(`채팅방 로딩 실패: ${errorText}`);
    }

    const chatrooms = await response.json();
    const chatroomList = document.getElementById('chatroomList');
    chatroomList.innerHTML = '';

    chatrooms.forEach(chatroom => {
      const div = document.createElement('div');
      div.classList.add('chatroom-item');
      div.setAttribute("data-chatroom-id", chatroom.id);
      div.style.display = "flex";
      div.style.alignItems = "center";
      div.style.justifyContent = "space-between";

      const chatroomText = document.createElement('span');
      chatroomText.textContent = `채팅방 #${chatroom.id}`;
      chatroomText.style.flex = "1";
      chatroomText.style.cursor = "pointer";
      chatroomText.onclick = () => loadChatMessages(chatroom.id);

      // 삭제 버튼 추가 (아이콘 형태 개선)
      const deleteBtn = document.createElement('button');
      deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
      deleteBtn.style.marginLeft = "10px";
      deleteBtn.style.cursor = "pointer";
      deleteBtn.style.border = "none";
      deleteBtn.style.background = "transparent";
      deleteBtn.style.color = "#ff4d4d";
      deleteBtn.style.fontSize = "1.2em";
      deleteBtn.style.padding = "5px";
      deleteBtn.onclick = (event) => {
        event.stopPropagation(); // 채팅방 클릭 이벤트 방지
        deleteChatRoom(chatroom.id);
      };

      div.appendChild(chatroomText);
      div.appendChild(deleteBtn);
      chatroomList.appendChild(div);
    });
  }

  async function deleteChatRoom(chatroomId) {
    const token = getAuthToken();
    if (!token) {
      alert("로그인이 필요합니다.");
      return;
    }

    if (!confirm("이 채팅방과 관련된 모든 메시지가 삭제됩니다. 계속하시겠습니까?")) {
      return;
    }

    try {
      const response = await requestWithAuth(`http://localhost:8080/api/chatbot/chatroom/${chatroomId}`, {
        method: "DELETE",
        headers: {
          "Authorization": `Bearer ${token}`
        }
      });

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(`채팅방 삭제 실패: ${errorText}`);
      }

      alert("채팅방과 관련된 모든 메시지가 삭제되었습니다.");
      loadChatrooms(); // 채팅방 목록 갱신
    } catch (error) {
      console.error("채팅방 삭제 오류:", error);
      alert(`채팅방을 삭제할 수 없습니다.\n오류 메시지: ${error.message}`);
    }
  }

  async function loadChatMessages(chatroomId) {
    const token = getAuthToken();
    if (!token) return alert("로그인이 필요합니다.");

    currentChatroomId = chatroomId;
    document.querySelector('.chat-header').textContent = `채팅방 #${chatroomId}`;
    document.querySelectorAll('.chatroom-item').forEach(item => item.classList.remove('active'));

    const chatroomElement = document.querySelector(`[data-chatroom-id="${chatroomId}"]`);
    if (chatroomElement) chatroomElement.classList.add('active');

    window.history.pushState(null, "", `/chat/${chatroomId}`);

    try {
      const response = await requestWithAuth(`http://localhost:8080/api/chatbot/chatroom/${chatroomId}/messages`, {
        method: 'GET',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!response.ok) throw new Error("채팅 메시지 불러오기 실패");

      const messages = await response.json();
      const chatBox = document.getElementById('messagesContainer');
      chatBox.innerHTML = ''; // 이전 메시지 초기화

      messages.forEach(msg => {
        // 사용자 메시지 추가
        const userWrapper = document.createElement('div');
        userWrapper.classList.add('message-wrapper', 'user');

        const userMessage = document.createElement('div');
        userMessage.classList.add('message', 'user');
        // textContent 대신 markdownToHTML 함수를 이용해 innerHTML로 변환
        userMessage.innerHTML = markdownToHTML(msg.message);

        userWrapper.appendChild(userMessage);
        chatBox.appendChild(userWrapper);

        // 봇 응답 메시지 추가 (response가 있을 경우)
        if (msg.response) {
          const botWrapper = document.createElement('div');
          botWrapper.classList.add('message-wrapper', 'bot');

          const botMessage = document.createElement('div');
          botMessage.classList.add('message', 'bot');
          // 마찬가지로 마크다운 변환 적용
          botMessage.innerHTML = markdownToHTML(msg.response);

          botWrapper.appendChild(botMessage);
          chatBox.appendChild(botWrapper);
        }
      });

      chatBox.scrollTop = chatBox.scrollHeight; // 스크롤 자동 하단 이동
      addCopyButtons(); // 코드 블록이 새로 추가될 때마다 실행
    } catch (error) {
      console.error("채팅방 메시지 불러오기 오류:", error);
    }
  }

  function displayMessage(text, sender) {
    const chatBox = document.getElementById('messagesContainer');

    // 메시지 감싸는 div
    const messageWrapper = document.createElement('div');
    messageWrapper.classList.add('message-wrapper', sender);

    // 메시지 말풍선 div
    const messageDiv = document.createElement('div');
    messageDiv.classList.add('message', sender);
    messageDiv.textContent = text;

    // messageWrapper에 메시지 추가 후, chatBox에 추가
    messageWrapper.appendChild(messageDiv);
    chatBox.appendChild(messageWrapper);

    // 스크롤 자동 하단 이동
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const message = input.value.trim();
    if (!message) return;

    const token = getAuthToken();
    if (!token) {
      alert("로그인이 필요합니다.");
      return;
    }

    const chatroomId = currentChatroomId;
    if (!chatroomId) {
      alert("채팅방을 선택하세요.");
      return;
    }

    displayMessage(message, "user");
    input.value = "";

    const loading = showLoadingSpinner();

    try {
      const response = await fetch(`http://localhost:8080/api/chatbot/chatroom/${chatroomId}/agent-query`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({ query: message })
      });

      if (!response.ok) {
        const errorText = await response.text();
        alert(`메시지 전송 실패 (HTTP ${response.status}): ${errorText}`);
        return;
      }

      removeLoadingSpinner(loading);
      const reader = response.body.getReader();
      const decoder = new TextDecoder("utf-8");
      const chatBox = document.getElementById('messagesContainer');

      let fullResponse = "";
      let finalMessage = "";

      const wrapper = document.createElement('div');
      wrapper.classList.add('message-wrapper', 'bot');
      const bubble = document.createElement('div');
      bubble.classList.add('message', 'bot');
      wrapper.appendChild(bubble);
      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;

      let done = false;

      while (!done) {
        const { value, done: doneReading } = await reader.read();
        done = doneReading;

        if (value) {
          const chunk = decoder.decode(value, { stream: true }).trim();

          // 여러 개의 JSON이 붙어서 올 경우를 방지하기 위해 {} 단위로 분할
          const jsonMatches = chunk.match(/({.*?})(?=\s*{|\s*$)/gs); // g: 전역, s: 줄바꿈 포함

          if (!jsonMatches) continue;

          // 기존 for 루프 내에서 JSON 처리 부분 수정
          for (const jsonStr of jsonMatches) {
            try {
              const json = JSON.parse(jsonStr);

              if (json.token) {
                fullResponse += json.token;
                bubble.innerHTML = markdownToHTML(fullResponse);
                chatBox.scrollTop = chatBox.scrollHeight;

                addCopyButtonsToElement(bubble); // bubble 요소만 확인
              } else if (json.final) {
                finalMessage = json.final;
                if (fullResponse.trim() !== finalMessage.trim()) {
                  console.warn("⚠️ token 누적값과 final 불일치:", fullResponse, finalMessage);
                }
                // 최종 응답은 이미 token 누적으로 보여주고 있으므로 따로 업데이트하지 않음

              } else if (json.tool_start) {
                // 도구 호출 메시지를 회색 로그 형태로 말풍선 내부에 추가 (DOM 요소로 생성)
                const toolLog = document.createElement("div");
                toolLog.classList.add("agent-log");
                toolLog.innerHTML = `${json.tool_start} (입력: ${JSON.stringify(json.input)})`;
                bubble.appendChild(toolLog);
                chatBox.scrollTop = chatBox.scrollHeight;
              } else if (json.log) {
                // 중간 추론 로그를 회색 글씨로 말풍선 내부에 추가 (DOM 요소로 생성)
                const intermediateLog = document.createElement("div");
                intermediateLog.classList.add("agent-log");
                intermediateLog.innerHTML = `${json.log}`;
                bubble.appendChild(intermediateLog);
                chatBox.scrollTop = chatBox.scrollHeight;
              }
            }
            catch (e) {
              console.warn("JSON 파싱 실패:", jsonStr);
            }
          }
        }
      }
    } catch (error) {
      console.error("스트리밍 응답 처리 오류:", error);
      alert(`서버와 연결할 수 없습니다.\n오류 메시지: ${error.message}`);
    }
  }

  function markdownToHTML(markdown) {
    const codeBlockRegex = /```([a-z]*)\n([\s\S]*?)```/g;
    const codeBlockMap = new Map();
    let i = 0;

    // 코드 블럭 먼저 추출하고 escape
    markdown = markdown.replace(codeBlockRegex, (_, lang, code) => {
      const escaped = code
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;");
      const key = `__CODE_BLOCK_${i}__`;
      const langClass = lang ? `language-${lang}` : "";
      codeBlockMap.set(key, { html: escaped, langClass });
      i++;
      return key;
    });

    // 일반 마크다운 먼저 처리 (코드블럭은 이 과정에서 보호됨)
    markdown = markdown
            .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>')
            .replace(/^### (.*)$/gm, '<h3>$1</h3>')
            .replace(/^## (.*)$/gm, '<h2>$1</h2>')
            .replace(/^# (.*)$/gm, '<h1>$1</h1>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n/g, '<br>');

    // 코드 블럭 다시 삽입
    codeBlockMap.forEach((val, key) => {
      markdown = markdown.replace(
              key,
              `<pre><code class="${val.langClass}">${val.html}</code></pre>`
      );
    });

    return markdown;
  }

  function showLoadingSpinner() {
    const chatBox = document.getElementById('messagesContainer');

    // 메시지 감싸는 div
    const messageWrapper = document.createElement('div');
    messageWrapper.classList.add('message-wrapper', 'bot');

    // 로딩 스피너 div
    const messageDiv = document.createElement('div');
    messageDiv.classList.add('message', 'bot');
    messageDiv.innerHTML = `<div class="loading-spinner"></div>`;

    messageWrapper.appendChild(messageDiv);
    chatBox.appendChild(messageWrapper);

    // 스크롤 자동 하단 이동
    chatBox.scrollTop = chatBox.scrollHeight;

    return messageWrapper;
  }

  function removeLoadingSpinner(loadingMessage) {
    if (loadingMessage) {
      loadingMessage.remove(); // DOM에서 제거
    }
  }


  document.getElementById('userInput').addEventListener('keypress', function(event) {
    if (event.key === 'Enter') {
      event.preventDefault();
      sendMessage();
    }
  });

  async function createNewChatroom() {
    const token = getAuthToken();
    if (!token) {
      alert("로그인이 필요합니다.");
      return;
    }

    try {
      const response = await requestWithAuth("http://localhost:8080/api/chatbot/chatroom", {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${token}`,
          "Content-Type": "application/json"
        }
      });

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(`채팅방 생성 실패: ${errorText}`);
      }

      const chatroom = await response.json();
      console.log("새 채팅방 생성 완료:", chatroom);

      // 채팅방 목록 갱신
      loadChatrooms();

      // 새 채팅방 자동 선택
      loadChatMessages(chatroom.id).then(() => {
        addCopyButtons();
      });

    } catch (error) {
      console.error("새 채팅방 생성 오류:", error);
      alert(`새 채팅방을 생성할 수 없습니다.\n오류 메시지: ${error.message}`);
    }
  }

  function logout() {
    localStorage.removeItem("accessToken");
    localStorage.removeItem("refreshToken");
    window.location.href = "/login"; // 로그아웃 후 로그인 페이지로 이동
  }

  document.addEventListener("DOMContentLoaded", function () {
    const logoutButton = document.getElementById("logout-button");
    const logo = document.querySelector(".logo");

    // 로그인 상태 확인 (토큰이 있는지 체크)
    function isLoggedIn() {
      return localStorage.getItem("accessToken") !== null;
    }

    // 로그인 상태일 때만 로그아웃 버튼 표시
    if (isLoggedIn()) {
      logoutButton.style.display = "block"; // 로그아웃 버튼 보이기
      loadChatrooms(); // 로그인 상태일 때만 채팅방 목록 로딩
    } else {
      window.location.href = "/login"; // 로그인 상태가 아니면 로그인 페이지로 리다이렉트
    }

    // 로그아웃 버튼 클릭 시 로그아웃 실행
    logoutButton.addEventListener("click", logout);

    // TRENDB 로고 클릭 시 홈(`/`)으로 이동
    logo.addEventListener("click", () => {
      window.location.href = "/";
    });
  });

  // 코드 블록에 복사 버튼 추가하는 함수
  function addCopyButtons() {
    document.querySelectorAll('.chat-box pre').forEach(pre => {
      // 복사 버튼이 이미 추가된 경우 건너뜀
      if (pre.querySelector('.copy-btn')) return;

      const copyBtn = document.createElement('button');
      copyBtn.classList.add('copy-btn');
      copyBtn.textContent = '복사';

      copyBtn.addEventListener('click', () => {
        const code = pre.querySelector('code').innerText;
        navigator.clipboard.writeText(code)
                .then(() => {
                  copyBtn.textContent = '복사됨!';
                  setTimeout(() => copyBtn.textContent = '복사', 2000);
                })
                .catch(err => alert('복사 실패: ', err));
      });

      pre.appendChild(copyBtn);
    });
  }

  // 특정 요소에만 복사 버튼 추가하는 함수
  function addCopyButtonsToElement(element) {
    element.querySelectorAll('pre').forEach(pre => {
      if (pre.querySelector('.copy-btn')) return;

      const copyBtn = document.createElement('button');
      copyBtn.classList.add('copy-btn');
      copyBtn.textContent = '복사';

      copyBtn.addEventListener('click', () => {
        const code = pre.querySelector('code').innerText;
        navigator.clipboard.writeText(code)
                .then(() => {
                  copyBtn.textContent = '복사됨!';
                  setTimeout(() => copyBtn.textContent = '복사', 2000);
                })
                .catch(err => alert('복사 실패:', err));
      });

      pre.appendChild(copyBtn);
    });
  }
</script>
